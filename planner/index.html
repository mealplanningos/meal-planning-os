<style>
/* =============================================================================
   MPOS TOKENS (from mpos-tokens.css — verbatim)
   ============================================================================= */
:root {
  /* Cobalt */
  --cobalt-50:#eef2ff; --cobalt-100:#e0e7ff; --cobalt-200:#c7d2fe; --cobalt-300:#a5b4fc;
  --cobalt-400:#818cf8; --cobalt-500:#4f46e5; --cobalt-600:#2b3dd6; --cobalt-700:#1e2fb8;
  --cobalt-800:#1a2a9c; --cobalt-900:#0f1a6b;
  --cobalt:var(--cobalt-600);

  /* Ink */
  --ink-900:#0a0f1f; --ink-800:#111827; --ink-700:#1f2937; --ink-600:#374151;
  --ink-500:#6b7280; --ink-400:#9ca3af; --ink-300:#d1d5db; --ink-200:#e5e7eb;
  --ink-100:#f3f4f6; --ink-50:#f9fafb;

  /* Surfaces */
  --bg-page:#eef1fb; --bg-page-alt:#f5f7fd; --bg-surface:#ffffff;
  --bg-surface-2:#f7f9ff; --bg-inverse:#0a0f1f;

  /* Accents */
  --accent-status:#22c55e; --accent-warn:#f59e0b; --accent-event:#ef4444;

  /* Type */
  --font-sans:'Inter', ui-sans-serif, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  --font-mono:'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;

  /* Shadows */
  --shadow-1: 0 1px 2px rgba(15, 26, 107, 0.06), 0 1px 1px rgba(15, 26, 107, 0.04);
  --shadow-2: 0 2px 6px rgba(15, 26, 107, 0.08), 0 1px 2px rgba(15, 26, 107, 0.05);
  --shadow-3: 0 8px 24px rgba(15, 26, 107, 0.10), 0 2px 6px rgba(15, 26, 107, 0.06);
  --shadow-focus: 0 0 0 3px rgba(43, 61, 214, 0.25);
  --shadow-brand: 0 6px 16px rgba(43, 61, 214, 0.28);

  /* Motion */
  --ease-standard: cubic-bezier(0.2, 0, 0, 1);
  --dur-med: 200ms;
}

/* =============================================================================
   BASE
   ============================================================================= */
*,*::before,*::after { box-sizing: border-box; }
html,body { margin:0; padding:0; }
body {
  font-family: var(--font-sans);
  background: var(--bg-page);
  color: var(--ink-900);
  font-size: 15px;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

.page {
  max-width: 640px;
  margin: 0 auto;
  padding: 20px 20px 80px;
}

/* =============================================================================
   HEADER / LOGO
   ============================================================================= */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 0 24px;
}
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  color: inherit;
}
.logo-svg {
  width: 28px;
  height: 28px;
  flex-shrink: 0;
}
.logo-text {
  font-size: 15px;
  font-weight: 800;
  letter-spacing: -0.01em;
  color: var(--ink-900);
  line-height: 1;
}
.logo-text span { color: var(--cobalt-600); }
.header-meta {
  font-size: 11px;
  color: var(--ink-500);
  font-weight: 500;
  letter-spacing: 0.02em;
}

/* =============================================================================
   PROGRESS
   ============================================================================= */
.progress-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 28px;
}
.progress-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.08em;
  color: var(--cobalt-600);
  white-space: nowrap;
  text-transform: uppercase;
}
.progress-track {
  flex: 1;
  height: 3px;
  background: var(--ink-100);
  border-radius: 2px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--cobalt-600);
  transition: width var(--dur-med) var(--ease-standard);
}

/* =============================================================================
   TYPOGRAPHY BLOCKS
   ============================================================================= */
.eyebrow {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--cobalt-600);
  margin-bottom: 8px;
}
h1.h1 {
  font-size: 30px;
  line-height: 1.1;
  letter-spacing: -0.02em;
  font-weight: 800;
  color: var(--ink-900);
  margin: 0 0 10px;
}
@media (min-width: 520px) {
  h1.h1 { font-size: 34px; }
}
.sub {
  font-size: 15px;
  line-height: 1.5;
  color: var(--ink-600);
  margin: 0 0 20px;
  max-width: 540px;
}
/* =============================================================================
   CARDS / PICKERS
   ============================================================================= */
.option-list { display: grid; gap: 10px; margin: 0 0 24px; }

.option-card {
  background: var(--bg-surface);
  border: 1.5px solid var(--ink-200);
  border-radius: 12px;
  padding: 14px 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 12px;
  transition: all 140ms var(--ease-standard);
  box-shadow: var(--shadow-1);
  text-align: left;
  width: 100%;
  font-family: inherit;
  color: inherit;
}
.option-card:hover { border-color: var(--cobalt-300); }
.option-card:focus-visible { outline: none; box-shadow: var(--shadow-focus); }
.option-card.selected {
  border-color: var(--cobalt-600);
  background: var(--bg-surface);
  box-shadow: 0 0 0 3px rgba(43,61,214,0.12), var(--shadow-1);
}

.check {
  width: 22px;
  height: 22px;
  border-radius: 6px;
  border: 1.5px solid var(--ink-300);
  display: grid;
  place-items: center;
  flex-shrink: 0;
  background: var(--bg-surface);
  transition: all 120ms var(--ease-standard);
}
.option-card.selected .check {
  border-color: var(--cobalt-600);
  background: var(--cobalt-600);
}
.check svg { display: none; }
.option-card.selected .check svg { display: block; }

.option-body { flex: 1; min-width: 0; }
.option-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--ink-900);
  line-height: 1.25;
  margin-bottom: 2px;
}
.option-meta {
  font-size: 12.5px;
  color: var(--ink-500);
  font-weight: 500;
}
.option-badge {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--cobalt-600);
  padding: 2px 6px;
  background: var(--cobalt-50);
  border-radius: 4px;
  margin-left: 8px;
  white-space: nowrap;
}

/* =============================================================================
   CTAs
   ============================================================================= */
.cta-row {
  display: flex;
  gap: 10px;
  align-items: center;
  margin-top: 8px;
}
.cta {
  font-family: inherit;
  font-size: 15px;
  font-weight: 600;
  padding: 13px 20px;
  border-radius: 10px;
  cursor: pointer;
  border: none;
  transition: all 200ms var(--ease-standard);
}
.cta-primary {
  background: var(--cobalt-600);
  color: #fff;
  box-shadow: var(--shadow-brand);
  flex: 1;
}
.cta-primary:hover { background: var(--cobalt-700); }
.cta-primary:disabled {
  background: var(--ink-300);
  color: var(--ink-500);
  box-shadow: none;
  cursor: not-allowed;
}
.cta-ghost {
  background: #fff;
  color: var(--ink-900);
  border: 1px solid var(--ink-200);
}
.cta-ghost:hover { border-color: var(--ink-300); background: var(--bg-surface-2); }
.cta-text {
  background: none;
  border: none;
  color: var(--cobalt-600);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  padding: 8px 4px;
}
.cta-text:hover { color: var(--cobalt-700); }

.context-meta {
  font-size: 12.5px;
  color: var(--ink-500);
  margin-bottom: 14px;
  letter-spacing: 0.01em;
}
.context-meta .day-chip {
  display: inline-block;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.08em;
  padding: 3px 7px;
  background: var(--ink-100);
  border-radius: 4px;
  margin-right: 6px;
  color: var(--ink-700);
  text-transform: uppercase;
}

/* =============================================================================
   PLAN (STEP 5) — hi-fi light card with header bar
   ============================================================================= */
.plan-intro {
  margin: 0 0 16px;
}
.plan-intro .eyebrow { color: var(--cobalt-600); }
.plan-intro h1.h1 { margin-bottom: 8px; }
.plan-intro .sub {
  color: var(--ink-600);
  margin-bottom: 0;
}
.plan-intro .sub strong { color: var(--ink-900); font-weight: 700; }

.plan-card {
  background: var(--bg-surface);
  border: 1px solid var(--ink-200);
  border-radius: 12px;
  margin: 0 0 16px;
  box-shadow: var(--shadow-1);
  overflow: hidden;
}
.plan-card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 16px;
  border-bottom: 1px solid var(--ink-200);
}
.plan-card-header h3 {
  font-size: 14px;
  font-weight: 700;
  color: var(--ink-900);
  margin: 0;
  letter-spacing: -0.005em;
}
.plan-card-header .eyebrow {
  margin: 0;
  color: var(--ink-500);
}
.plan-row {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--ink-100);
  background: var(--bg-surface);
}
.plan-entry:last-child .plan-row,
.plan-entry:last-child .recipe { border-bottom: none; }
.plan-day {
  width: 42px;
  flex-shrink: 0;
  padding-top: 1px;
}
.plan-day .day-code {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.08em;
  color: var(--ink-900);
}
.plan-day .date {
  display: block;
  font-size: 10px;
  color: var(--ink-500);
  margin-top: 2px;
}
.plan-meal { flex: 1; min-width: 0; }
.plan-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--cobalt-600);
  line-height: 1.3;
}
.plan-theme {
  font-size: 11px;
  color: var(--ink-500);
  letter-spacing: 0.04em;
  margin-top: 2px;
}

/* Plan-entry wrapper — pairs a plan-row + its recipe block. Used by print
   CSS to guarantee each recipe lands on its own page. */
.plan-entry { background: var(--bg-surface); }

/* Recipe collapsibles */
.recipe {
  padding: 14px 16px 16px 70px;
  border-bottom: 1px solid var(--ink-100);
  font-size: 13px;
  line-height: 1.55;
  color: var(--ink-700);
  background: var(--bg-surface);
}
.recipe-steps { margin: 0; padding: 0; list-style: none; counter-reset: step; }
.recipe-steps li {
  counter-increment: step;
  padding: 3px 0 3px 22px;
  position: relative;
}
.recipe-steps li::before {
  content: counter(step);
  position: absolute;
  left: 0;
  top: 3px;
  width: 16px;
  height: 16px;
  background: var(--cobalt-50);
  color: var(--cobalt-700);
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 700;
  border-radius: 4px;
  display: grid;
  place-items: center;
  line-height: 1;
}

/* Grocery card — hi-fi header bar */
.grocery-card {
  background: var(--bg-surface);
  border: 1px solid var(--ink-200);
  border-radius: 12px;
  margin: 0 0 20px;
  box-shadow: var(--shadow-1);
  overflow: hidden;
}
.grocery-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 16px;
  border-bottom: 1px solid var(--ink-200);
}
.grocery-header h3 {
  font-size: 14px;
  font-weight: 700;
  color: var(--ink-900);
  margin: 0;
  letter-spacing: -0.005em;
}
.grocery-header .eyebrow {
  margin: 0;
  color: var(--ink-500);
}
.grocery-body { padding: 14px 16px 16px; }
.grocery-section { margin-bottom: 14px; }
.grocery-section:last-child { margin-bottom: 0; }
.grocery-section h4 {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-900);
  margin: 0 0 8px;
}
.grocery-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 5px 0;
  font-size: 14px;
  cursor: pointer;
  user-select: none;
  color: var(--ink-700);
}
.grocery-item .check { width: 18px; height: 18px; border-radius: 4px; }
.grocery-item.checked { color: var(--ink-400); text-decoration: line-through; }
.grocery-item .qty {
  margin-left: auto;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--ink-500);
  font-weight: 500;
}
.grocery-assumes {
  font-size: 11px;
  color: var(--ink-500);
  padding: 12px 16px;
  border-top: 1px dashed var(--ink-200);
  line-height: 1.5;
  background: var(--bg-surface-2);
}

/* =============================================================================
   EMAIL CAPTURE — hi-fi dark inverse block
   ============================================================================= */
.capture {
  background: var(--bg-inverse);
  color: #fff;
  border-radius: 12px;
  padding: 22px 22px;
  margin: 0 0 20px;
  position: relative;
  overflow: hidden;
}
.capture::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 80% 0%, rgba(43,61,214,0.22) 0%, transparent 60%);
  pointer-events: none;
}
.capture > * { position: relative; z-index: 1; }
.capture .eyebrow {
  color: var(--cobalt-300);
  margin-bottom: 8px;
}
.capture h2 {
  font-size: 20px;
  line-height: 1.2;
  letter-spacing: -0.01em;
  font-weight: 800;
  color: #fff;
  margin: 0 0 8px;
}
.capture p {
  font-size: 13.5px;
  line-height: 1.5;
  color: rgba(255,255,255,0.68);
  margin: 0 0 14px;
}
/* Native subscribe form — posts to /.netlify/functions/subscribe → Beehiiv API */
.capture-form {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 4px;
}
.capture-input {
  width: 100%;
  padding: 13px 14px;
  font-family: inherit;
  font-size: 15px;
  line-height: 1.3;
  color: var(--ink-900);
  background: #fff;
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 10px;
  outline: none;
  transition: box-shadow 120ms ease, border-color 120ms ease;
}
.capture-input:focus {
  border-color: var(--cobalt-300);
  box-shadow: 0 0 0 3px rgba(124,138,255,0.35);
}
.capture-input:disabled { opacity: 0.7; cursor: not-allowed; }
.capture-submit {
  width: 100%;
  padding: 13px 14px;
  font-family: inherit;
  font-size: 15px;
  font-weight: 700;
  color: #fff;
  background: var(--cobalt-600, #2b3dd6);
  border: 1px solid var(--cobalt-600, #2b3dd6);
  border-radius: 10px;
  cursor: pointer;
  transition: transform 80ms ease, background 120ms ease, box-shadow 120ms ease;
}
.capture-submit:hover:not(:disabled) { background: #3a4cee; }
.capture-submit:active:not(:disabled) { transform: translateY(1px); }
.capture-submit:disabled { opacity: 0.7; cursor: not-allowed; }
.capture-error {
  font-size: 13px;
  color: #ffb4b4;
  margin-top: 2px;
}
.capture-success {
  font-size: 15px;
  font-weight: 600;
  color: rgba(255,255,255,0.85);
  text-align: center;
  padding: 14px 10px;
  margin-top: 4px;
  letter-spacing: -0.005em;
}

.save-hint {
  text-align: center;
  font-size: 12.5px;
  color: var(--ink-600);
  background: var(--bg-surface-2);
  padding: 10px 14px;
  border-radius: 8px;
  margin: 0 0 12px;
  line-height: 1.45;
}
.save-hint strong { color: var(--ink-900); font-weight: 700; }
.share-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
  margin: 0 0 24px;
}
.share-row button {
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  padding: 9px 14px;
  background: var(--bg-surface);
  color: var(--ink-700);
  border: 1px solid var(--ink-200);
  border-radius: 999px;
  cursor: pointer;
  box-shadow: var(--shadow-1);
}
.share-row button:hover { border-color: var(--ink-300); }
.share-row button.primary {
  background: var(--cobalt-600);
  color: #fff;
  border-color: var(--cobalt-600);
}
.share-row button.primary:hover { background: var(--cobalt-700); border-color: var(--cobalt-700); }
.share-row button.primary.copied {
  background: var(--accent-status);
  border-color: var(--accent-status);
  transition: background-color 200ms var(--ease-standard), border-color 200ms var(--ease-standard);
}
.share-row button.primary.copied:hover { background: var(--accent-status); border-color: var(--accent-status); }

/* Tripwire — a subtle, one-line cross-sell to the full MPOS web app.
   Lives between the share row and the final CTA row. Easy to ignore, easy
   to click — should NOT feel like a paid-product hard sell. */
.tripwire {
  text-align: center;
  font-size: 12.5px;
  color: var(--ink-500);
  margin: 4px 0 20px;
  line-height: 1.5;
}
.tripwire a {
  color: var(--cobalt-600);
  font-weight: 600;
  text-decoration: none;
  border-bottom: 1px dotted var(--cobalt-300);
  padding-bottom: 1px;
  transition: color 150ms var(--ease-standard), border-color 150ms var(--ease-standard);
}
.tripwire a:hover { color: var(--cobalt-700); border-bottom-color: var(--cobalt-600); }

/* Week-nav — interactive ◀ ▶ pills around the displayed week label.
   Sits in the header, replacing the static week label when interactive. */
.week-nav {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: var(--bg-surface);
  border: 1px solid var(--ink-200);
  border-radius: 999px;
  padding: 2px 4px;
  box-shadow: var(--shadow-1);
}
.week-nav-btn {
  font-family: inherit;
  font-size: 11px;
  line-height: 1;
  font-weight: 700;
  color: var(--ink-600);
  background: transparent;
  border: 0;
  border-radius: 999px;
  width: 22px;
  height: 22px;
  display: grid;
  place-items: center;
  cursor: pointer;
  transition: background var(--dur-med) var(--ease-standard), color var(--dur-med) var(--ease-standard);
}
.week-nav-btn:hover { background: var(--ink-100); color: var(--ink-900); }
.week-nav-btn:active { transform: translateY(1px); }
.week-nav-btn:focus-visible { outline: 2px solid var(--cobalt-500); outline-offset: 1px; }
.week-nav-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--ink-700);
  padding: 0 6px;
  white-space: nowrap;
  font-variant-numeric: tabular-nums;
}

/* Per-recipe ingredient expand — a quiet pill button that toggles the recipe's
   own ingredient list. Default collapsed; print CSS forces it open so the
   printed plan always includes ingredients. */
.recipe-toggle {
  font-family: inherit;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.01em;
  color: var(--cobalt-600);
  background: var(--cobalt-50);
  border: 1px solid var(--cobalt-200);
  border-radius: 999px;
  padding: 5px 12px;
  margin: 0 0 10px;
  cursor: pointer;
  transition: background var(--dur-med) var(--ease-standard);
}
.recipe-toggle:hover { background: #dde6ff; }
.recipe-toggle:focus-visible { outline: 2px solid var(--cobalt-500); outline-offset: 1px; }
.recipe-ingredients {
  display: none;
  list-style: none;
  margin: 0 0 12px;
  padding: 10px 12px;
  background: var(--bg-surface-2);
  border: 1px solid var(--ink-100);
  border-radius: 8px;
  font-size: 13.5px;
}
.recipe.open .recipe-ingredients { display: block; }
.recipe-ingredients li {
  display: flex;

.night-row.selected {

.night-row-check {

  gap: 8px;

}
.theme-card {
  padding: 14px 14px;
  border-radius: 12px;

  background: var(--bg-surface);

  color: var(--ink-500);

}

  margin: 0 0 20px;
}

.theme-confirm-sub {
  font-size: 13.5px;
  color: var(--ink-700);
  line-height: 1.4;
}

/* =============================================================================
   MEAL PICKER — radio variant of option-card
   ============================================================================= */
.option-card--radio .check {

  border: 1.5px solid var(--ink-300);
  position: relative;
}
.option-card--radio.selected .check {
  border-color: var(--cobalt-600);
  background: transparent !important;
}
.option-card--radio .check svg { display: none !important; }

  content: '';

  height: 10px;
  border-radius: 50%;
  background: var(--cobalt-600);
}

/* =============================================================================
   INTRO MODAL (Step 0)
   ============================================================================= */
.intro-overlay {

  -webkit-backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  z-index: 9999;
  animation: introFade 180ms var(--ease-standard);
}
.intro-card {
  background: #ffffff;
  border-radius: 20px;
  padding: 36px 32px 30px;
  max-width: 440px; width: 100%;
  text-align: center;
  box-shadow: var(--shadow-3);
  animation: introPop 240ms var(--ease-standard);
}
.intro-eyebrow {
  display: inline-block;
  background: var(--cobalt-50);
  color: var(--cobalt-700);
  font-size: 12px; font-weight: 600;
  padding: 5px 12px; border-radius: 999px;
  letter-spacing: 0.02em;
  margin-bottom: 20px;
  text-transform: uppercase;
}
.intro-title {
  font-size: 28px; line-height: 1.15;
  font-weight: 800; letter-spacing: -0.02em;
  color: var(--ink-900);
  margin: 0 0 10px;
}
.intro-sub {
  font-size: 17px; line-height: 1.45;
  color: var(--ink-600);
  margin: 0 0 26px;
}
.intro-cta {
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--cobalt-600); color: #fff;
  padding: 14px 26px; border-radius: 12px;
  font-size: 16px; font-weight: 700; border: 0;
  font-family: inherit;
  cursor: pointer;
  transition: background var(--dur-med) var(--ease-standard), transform 80ms ease;
  box-shadow: var(--shadow-brand);
  width: 100%;
}
.intro-cta:hover { background: var(--cobalt-700); }
.intro-cta:active { transform: translateY(1px); }
.intro-fine {
  font-size: 13px; color: var(--ink-500);
  margin: 14px 0 0;
}
@keyframes introFade {
  from { opacity: 0; }
  to { opacity: 1; }
}
@keyframes introPop {
  from { opacity: 0; transform: scale(0.96) translateY(6px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}
@media (max-width: 480px) {
  .intro-card { padding: 28px 22px 24px; border-radius: 18px; }
  .intro-title { font-size: 24px; }
  .intro-sub { font-size: 15px; }
}

/* =============================================================================
   PRINT
   ============================================================================= */
@media print {
  body { background: #fff; }
  .page { padding: 0; max-width: none; }
  .header, .progress-row, .save-hint, .capture, .win-callout, .tripwire, .footer-meta, .no-print, .eyebrow.no-print { display: none !important; }
  .plan-intro h1.h1 { color: #000; }
  /* Drop card chrome and — critically — the screen-mode `overflow: hidden` on
     .plan-card. With overflow hidden, browsers ignore page-break properties on
     descendants, which is why the print was cutting off mid-recipe. */
  .plan-card, .grocery-card {
    box-shadow: none;
    border: 0;
    border-radius: 0;
    margin: 0;
    overflow: visible;
  }
  .plan-card-header, .grocery-header { padding: 0 0 12px; }
  /* One recipe per page. The first plan-entry shares the page with the
     plan-intro / plan-card-header; every subsequent entry starts fresh.
     Both legacy (page-break-*) and modern (break-*) properties for max
     browser coverage — Safari still relies on the legacy variants. */
  .plan-entry {
    display: block;
    page-break-before: always;
    break-before: page;
    page-break-inside: avoid;
    break-inside: avoid;
  }
  .plan-entry:first-of-type {
    page-break-before: auto;
    break-before: auto;
  }
  .grocery-card {
    page-break-before: always;
    break-before: page;
  }
  .recipe { padding-left: 0; }
  /* Force every recipe's ingredient list visible on the printed copy regardless
     of in-app toggle state — paper plans without ingredients are useless. */
  .recipe-ingredients { display: block !important; }
}

/* =============================================================================
   HELPERS
   ============================================================================= */

function mealsForTheme(themeKey) {
  return MEALS.filter(m => m.theme === themeKey);
}

// weekOffset: 0 = this week, 1 = next week, -1 = last week, etc.
// Used by the week-toggle in the header so users can plan ahead or look back.
function weekOfString(weekOffset = 0) {
  const now = new Date();
  // Find the relevant Monday based on offset.
  const dow = now.getDay(); // 0=Sun
  const diff = (dow === 0 ? -6 : 1 - dow) + weekOffset * 7;
  const mon = new Date(now);
  mon.setDate(now.getDate() + diff);
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `Week of ${months[mon.getMonth()]} ${mon.getDate()}`;
}
function dateForDay(dayKey, weekOffset = 0) {
  const now = new Date();
  const dow = now.getDay();
  const diff = (dow === 0 ? -6 : 1 - dow) + weekOffset * 7;
  const mon = new Date(now);
  mon.setDate(now.getDate() + diff);
  const idx = DAYS.findIndex(d => d.key === dayKey);
  const out = new Date(mon);
  out.setDate(mon.getDate() + idx);
  const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  return `${months[out.getMonth()]} ${out.getDate()}`;
}

// Format minutes saved into a friendly string: "30 minutes", "1 hour", "1.5 hours", "2 hours", etc.
function formatTimeSaved(mins) {
  if (mins < 60) return `${mins} minutes`;
  const hours = mins / 60;
  if (Number.isInteger(hours)) return `${hours} hour${hours === 1 ? '' : 's'}`;
  // Odd half-hours → show one decimal (1.5 hours, 2.5 hours, etc.)
  return `${hours.toFixed(1)} hours`;
}

function buildPlan(nights, selections, weekOffset = 0) {
  // Only emit rows for the nights the user asked to plan. Leftover/off nights are
  // intentionally excluded — people aren't worried about them.
  const plan = [];
  for (const d of DAYS) {
    if (!nights.has(d.key)) continue;
    const sel = selections[d.key];
    const meal = MEALS.find(m => m.key === sel?.meal);
    if (!meal) continue;
    plan.push({
      day: d.key, label: d.label, short: d.short, date: dateForDay(d.key, weekOffset),
      meal, themeLabel: THEMES.find(t => t.key === meal.theme)?.label,
    });
  }
  return plan;
}

function buildGrocery(nights, selections) {
  const byName = {};
  for (const dayKey of nights) {
    const sel = selections[dayKey];
    if (!sel) continue;
    const meal = MEALS.find(m => m.key === sel.meal);
    if (!meal) continue;
    for (const ing of meal.ingredients) {
      const k = ing.name.toLowerCase();
      if (!byName[k]) {
        byName[k] = { name: ing.name, qty: ing.qty, cat: ing.cat };
      } else {
        if (byName[k].qty && byName[k].qty !== ing.qty) {
          byName[k].qty = byName[k].qty + ' + ' + ing.qty;
        }
      }
    }
  }
  const grouped = {};
  for (const k of CAT_ORDER) grouped[k] = [];
  for (const item of Object.values(byName)) {
    const c = CAT_ORDER.includes(item.cat) ? item.cat : 'OTHER';
    grouped[c].push(item);
  }
  for (const k of CAT_ORDER) grouped[k].sort((a, b) => a.name.localeCompare(b.name));
  const final = {};
  for (const k of CAT_ORDER) if (grouped[k].length) final[k] = grouped[k];
  return final;
}

function totalItems(grocery) {
  return Object.values(grocery).reduce((n, arr) => n + arr.length, 0);
}

/* =============================================================================
   PERSISTENCE — localStorage so a paid customer's plan survives refresh/return.
   Versioned key in case data shape changes; just bump v1 → v2 to invalidate old.
   Sets don't JSON-serialize natively, so we round-trip nights through an array.
   ============================================================================= */
const STORAGE_KEY = 'mpos_planner_v1';

function loadState() {
  try {
    if (typeof window === 'undefined' || !window.localStorage) return null;
    const raw = window.localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    // Defensive: any field could be missing or malformed if the user has been
    // through multiple versions. Coerce to safe defaults.
    return {
      step: typeof parsed.step === 'number' ? parsed.step : 1,
      household: parsed.household || null,
      nights: new Set(Array.isArray(parsed.nights) ? parsed.nights : []),
      selections: (parsed.selections && typeof parsed.selections === 'object') ? parsed.selections : {},
      weekOffset: typeof parsed.weekOffset === 'number' ? parsed.weekOffset : 0,
      checked: (parsed.checked && typeof parsed.checked === 'object') ? parsed.checked : {},
    };
  } catch (_) { return null; }
}

function saveState(state) {
  try {
    if (typeof window === 'undefined' || !window.localStorage) return;
    const serialized = {
      step: state.step,
      household: state.household,
      nights: Array.from(state.nights || []),
      selections: state.selections || {},
      weekOffset: state.weekOffset || 0,
      checked: state.checked || {},
    };
    window.localStorage.setItem(STORAGE_KEY, JSON.stringify(serialized));
  } catch (_) { /* quota exceeded / private mode — never crash on persistence */ }
}

function clearState() {
  try {
    if (typeof window !== 'undefined' && window.localStorage) {
      window.localStorage.removeItem(STORAGE_KEY);
    }
  } catch (_) {}
}

// Analytics — fires PostHog event if loaded; falls back to console for local dev.
// Wrapped in try/catch so a missing/blocked PostHog can never break the planner.
function track(event, props) {
  try {
    if (typeof window !== 'undefined' && window.posthog && typeof window.posthog.capture === 'function') {
      window.posthog.capture(event, props || {});
    }
  } catch (_) { /* swallow — never let analytics throw */ }
  if (typeof window !== 'undefined' && window.console) {
    console.log('[track]', event, props || {});
  }
}

/* =============================================================================
   SHARE CARD — canvas-generated PNG (1080×1350 for Instagram story/feed)
   ============================================================================= */

function roundRect(ctx, x, y, w, h, r) {
  // Clamp radius so arcTo never overshoots (otherwise paths get malformed)
  r = Math.max(0, Math.min(r, w / 2, h / 2));
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}
function truncateCanvas(ctx, s, maxW) {
  if (ctx.measureText(s).width <= maxW) return s;
  let cur = s;
  while (ctx.measureText(cur + '…').width > maxW && cur.length > 0) cur = cur.slice(0, -1);
  return cur + '…';
}
function wrapCanvas(ctx, text, x, y, maxW, lineH) {
  const words = text.split(' ');
  let line = '';
  let cy = y;
  for (const w of words) {
    const test = line ? line + ' ' + w : w;
    if (ctx.measureText(test).width > maxW && line) {
      ctx.fillText(line, x, cy);
      line = w;
      cy += lineH;
    } else {
      line = test;
    }
  }
  if (line) ctx.fillText(line, x, cy);
  return cy;
}

function generateShareCard(data) {
  // Square 1080×1080 social share card — matches the Steven-provided hi-fi mockup.
  const W = 1080, H = 1080, PAD = 72;
  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');
  const sysFont = '-apple-system, "SF Pro Text", "Segoe UI", system-ui, sans-serif';
  const monoFont = '"SF Mono", "JetBrains Mono", ui-monospace, monospace';
  const COBALT = '#2b3dd6';
  const COBALT_50 = '#eef2ff';
  const INK_900 = '#0a0f1f';
  const INK_500 = '#6b7280';
  const INK_200 = '#e5e7eb';
  const INK_100 = '#f3f4f6';

  // Background — warm cream matching bg-page-alt
  ctx.fillStyle = '#f5f7fd';
  ctx.fillRect(0, 0, W, H);

  // Subtle cobalt wash in top-right corner
  const rad = ctx.createRadialGradient(W * 0.92, 40, 40, W * 0.92, 40, 720);
  rad.addColorStop(0, 'rgba(79, 70, 229, 0.10)');
  rad.addColorStop(1, 'rgba(79, 70, 229, 0)');
  ctx.fillStyle = rad;
  ctx.fillRect(0, 0, W, H);

  // ======= TOP ROW: logo + week chip =======
  const topY = PAD;
  const logoSize = 52;

  // Logo — white rounded square + grid glyph (ink lines)
  ctx.fillStyle = '#ffffff';
  roundRect(ctx, PAD, topY, logoSize, logoSize, 12);
  ctx.fill();
  ctx.strokeStyle = INK_200;
  ctx.lineWidth = 1;
  roundRect(ctx, PAD, topY, logoSize, logoSize, 12);
  ctx.stroke();
  ctx.strokeStyle = INK_900;
  ctx.lineWidth = 2.2;
  ctx.lineCap = 'round';
  const gx = PAD + 14, gy = topY + 14, gs = 24;
  ctx.beginPath();
  ctx.moveTo(gx, gy);             ctx.lineTo(gx, gy + gs);
  ctx.moveTo(gx + gs/2, gy);      ctx.lineTo(gx + gs/2, gy + gs);
  ctx.moveTo(gx + gs, gy);        ctx.lineTo(gx + gs, gy + gs);
  ctx.moveTo(gx, gy);             ctx.lineTo(gx + gs, gy);
  ctx.moveTo(gx, gy + gs/2);      ctx.lineTo(gx + gs, gy + gs/2);
  ctx.moveTo(gx, gy + gs);        ctx.lineTo(gx + gs, gy + gs);
  ctx.stroke();

  // Wordmark
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'left';
  ctx.fillStyle = INK_900;
  ctx.font = `800 24px ${sysFont}`;
  const wmX = PAD + logoSize + 14;
  const wmY = topY + logoSize/2;
  ctx.fillText('Meal Planning', wmX, wmY);
  const mpW = ctx.measureText('Meal Planning ').width;
  ctx.fillStyle = COBALT;
  ctx.fillText('OS', wmX + mpW, wmY);

  // Week chip top-right
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = INK_500;
  ctx.font = `500 16px ${monoFont}`;
  ctx.fillText((data.weekLabel || 'This week').toUpperCase(), W - PAD, topY + logoSize/2);

  // Divider below top row
  const dividerY = topY + logoSize + 28;
  ctx.strokeStyle = INK_200;
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(PAD, dividerY); ctx.lineTo(W - PAD, dividerY); ctx.stroke();

  // ======= EYEBROW =======
  ctx.textBaseline = 'alphabetic';
  ctx.textAlign = 'left';
  ctx.fillStyle = COBALT;
  ctx.font = `700 14px ${sysFont}`;
  const eyebrowY = dividerY + 46;
  ctx.fillText('PLANNED IN 60 SECONDS', PAD, eyebrowY);

  // ======= BIG HEADLINE =======
  // Line 1: "N dinners planned in 1 minute."   Line 2: "[time] saved this week."
  ctx.textAlign = 'left';
  const headlineSize = 64;
  ctx.font = `800 ${headlineSize}px ${sysFont}`;

  // Line 1 — "N dinners planned in 1 minute." with N in cobalt
  const line1Y = eyebrowY + 72;
  const nStr = `${data.cookCount}`;
  const nW = ctx.measureText(nStr).width;
  ctx.fillStyle = COBALT;
  ctx.fillText(nStr, PAD, line1Y);
  ctx.fillStyle = INK_900;
  const dinnerWord = ` dinner${data.cookCount === 1 ? '' : 's'} planned in 1 minute.`;
  ctx.fillText(dinnerWord, PAD + nW, line1Y);

  // Line 2 — "[time] saved this week." with time in cobalt
  const line2Y = line1Y + 84;
  const timeStr = data.timeSavedStr || '0 minutes';
  ctx.fillStyle = COBALT;
  ctx.fillText(timeStr, PAD, line2Y);
  const timeW = ctx.measureText(timeStr).width;
  ctx.fillStyle = INK_900;
  ctx.fillText(' saved this week.', PAD + timeW, line2Y);

  // ======= DAY CARDS =======
  // Show up to 5 planned nights in a horizontal row
  const cookPlans = (data.plan || []).slice(0, 5);
  const cardsY = line2Y + 76;
  const cardsCount = Math.max(1, cookPlans.length);
  const cardsGap = 14;
  const cardsAvailW = W - 2 * PAD;
  const cardW = Math.floor((cardsAvailW - cardsGap * (cardsCount - 1)) / cardsCount);
  const cardH = 220;

  cookPlans.forEach((row, i) => {
    const x = PAD + i * (cardW + cardsGap);
    const y = cardsY;

    // Card background — white on light cream, subtle shadow as a soft cobalt-tinted rect
    ctx.fillStyle = 'rgba(43, 61, 214, 0.08)';
    roundRect(ctx, x, y + 4, cardW, cardH, 14);
    ctx.fill();
    ctx.fillStyle = '#ffffff';
    roundRect(ctx, x, y, cardW, cardH, 14);
    ctx.fill();
    ctx.strokeStyle = INK_100;
    ctx.lineWidth = 1;
    roundRect(ctx, x, y, cardW, cardH, 14);
    ctx.stroke();

    // Day code — mono, top of card in a cobalt-50 pill
    const pillH = 32;
    const pillPadX = 10;
    ctx.font = `700 14px ${monoFont}`;
    const pillTextW = ctx.measureText(row.short).width;
    const pillW = pillTextW + pillPadX * 2;
    const pillX = x + 14;
    const pillY = y + 14;
    ctx.fillStyle = COBALT_50;
    roundRect(ctx, pillX, pillY, pillW, pillH, 8);
    ctx.fill();
    ctx.fillStyle = COBALT;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText(row.short, pillX + pillPadX, pillY + pillH/2 + 1);

    // Meal title — wraps up to 3 lines
    ctx.textBaseline = 'alphabetic';
    ctx.fillStyle = INK_900;
    ctx.font = `700 18px ${sysFont}`;
    const titleX = x + 14;
    const titleY = pillY + pillH + 32;
    const titleMaxW = cardW - 28;
    const titleLines = wrapLines(ctx, row.meal.title, titleMaxW, 3);
    titleLines.forEach((ln, j) => {
      ctx.fillText(ln, titleX, titleY + j * 24);
    });

    // Theme label — cobalt, small, bottom
    ctx.fillStyle = COBALT;
    ctx.font = `600 12px ${sysFont}`;
    const themeY = y + cardH - 18;
    ctx.fillText(truncateCanvas(ctx, row.themeLabel || '', titleMaxW), titleX, themeY);
  });

  // ======= EMOTIONAL QUOTE BLOCK =======
  // Fills the space between meal cards and footer with a sharp, emotionally-charged
  // reframing of the "what's for dinner?" problem — the core MPOS thesis in one line.
  const cardsEndY = cardsY + cardH;
  const quoteBoxY = cardsEndY + 60;
  const quoteBoxH = 180;
  const quoteBoxX = PAD;
  const quoteBoxW = W - 2 * PAD;

  // Soft cobalt-tinted panel (very subtle — visible on cream, but quiet)
  ctx.fillStyle = 'rgba(43, 61, 214, 0.06)';
  roundRect(ctx, quoteBoxX, quoteBoxY, quoteBoxW, quoteBoxH, 20);
  ctx.fill();
  // Left edge accent bar in cobalt
  ctx.fillStyle = COBALT;
  roundRect(ctx, quoteBoxX, quoteBoxY, 6, quoteBoxH, 3);
  ctx.fill();

  // Quote body — two lines of ink-900 bold, emotional reframing
  ctx.textAlign = 'left';
  ctx.textBaseline = 'alphabetic';
  const quoteTextX = quoteBoxX + 36;
  ctx.fillStyle = INK_900;
  ctx.font = `800 32px ${sysFont}`;
  const quoteLine1 = `"What's for dinner?" isn't a question`;
  const quoteLine2 = `you need to ask every night.`;
  ctx.fillText(quoteLine1, quoteTextX, quoteBoxY + 64);
  ctx.fillText(quoteLine2, quoteTextX, quoteBoxY + 104);

  // Attribution / payoff line in cobalt
  ctx.fillStyle = COBALT;
  ctx.font = `700 20px ${sysFont}`;
  ctx.fillText('Plug into the system once — not seven times a week.', quoteTextX, quoteBoxY + 150);

  // ======= FOOTER — stats + CTA + URL chip =======
  const footerY = H - PAD;
  // Stats chunk (left)
  ctx.textAlign = 'left';
  ctx.textBaseline = 'alphabetic';
  ctx.fillStyle = INK_500;
  ctx.font = `500 17px ${sysFont}`;
  const stats = `${data.totalGrocery || 0} grocery items · one trip · ${data.householdLabel || 'built for you'}`;
  ctx.fillText(truncateCanvas(ctx, stats, W/2 - PAD - 16), PAD, footerY);

  // URL chip (right)
  ctx.font = `700 17px ${sysFont}`;
  const urlText = 'app.mealplanningos.com/planner';
  ctx.textAlign = 'right';
  const urlW = ctx.measureText(urlText).width;
  const chipPadX = 16, chipPadY = 10;
  const chipH = 40;
  const chipW = urlW + chipPadX * 2;
  const chipX = W - PAD - chipW;
  const chipY = footerY - chipH + 6;
  ctx.fillStyle = INK_900;
  roundRect(ctx, chipX, chipY, chipW, chipH, chipH / 2);
  ctx.fill();
  ctx.fillStyle = '#ffffff';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillText(urlText, chipX + chipPadX, chipY + chipH/2 + 1);

  return canvas;
}

// Wrap text into up to maxLines lines; returns array of strings (last one may be …-truncated)
function wrapLines(ctx, text, maxW, maxLines) {
  const words = String(text || '').split(/\s+/);
  const lines = [];
  let cur = '';
  for (const w of words) {
    const tryLine = cur ? cur + ' ' + w : w;
    if (ctx.measureText(tryLine).width <= maxW) {
      cur = tryLine;
    } else {
      if (cur) lines.push(cur);
      cur = w;
      if (lines.length >= maxLines) break;
    }
  }
  if (cur && lines.length < maxLines) lines.push(cur);
  if (lines.length === maxLines && ctx.measureText(cur).width > maxW) {
    // truncate last line with ellipsis
    let last = cur;
    while (last.length > 1 && ctx.measureText(last + '…').width > maxW) {
      last = last.slice(0, -1);
    }
    lines[lines.length - 1] = last + '…';
  }
  return lines;
}

function Step5Plan({ nights, selections, household, weekOffset = 0, checked, setChecked, onBack, onReset }) {
  const plan = useMemo(() => buildPlan(nights, selections, weekOffset), [nights, selections, weekOffset]);
  const grocery = useMemo(() => buildGrocery(nights, selections), [nights, selections]);
  const totalGrocery = totalItems(grocery);
  const cookCount = plan.length;
  const householdLabel = HOUSEHOLDS.find(h => h.key === household)?.label;

  // ~30 minutes saved per dinner (decision + search + scramble eliminated)
  const minutesSaved = cookCount * 30;
  const timeSavedStr = formatTimeSaved(minutesSaved);

  // `checked` and `setChecked` are now lifted to App() so they survive a
  // page refresh (saved to localStorage alongside the rest of the plan state).
  // Per-recipe ingredient expand state, keyed by day. Default closed so the
  // plan stays scannable; user clicks to reveal that recipe's ingredients.
  const [openIngredients, setOpenIngredients] = useState({});
  const toggleIngredients = (day) => {
    setOpenIngredients(prev => ({ ...prev, [day]: !prev[day] }));
    track('lm_ingredients_toggle', { day });
  };

  useEffect(() => {
    track('lm_plan_revealed', {
      nights: Array.from(nights),
      household,
      cook_count: cookCount,
      minutes_saved: minutesSaved,
    });
  }, []);

  const toggleItem = (cat, name) => {
    const k = `${cat}::${name}`;
    setChecked(prev => ({ ...prev, [k]: !prev[k] }));
  };

  // The canonical URL the user paid for. We surface it via a Copy-link button
  // so they can save it back to themselves (Notes, email, bookmarks bar).
  const PLANNER_URL = 'https://app.mealplanningos.com/planner';

  // Tripwire URL → MPOS web app sales page, UTM-tagged so we can attribute
  // upgrades back to dinner-planner buyers in Beehiiv/PostHog.
  const TRIPWIRE_URL = 'https://meal-planning-os.netlify.app/sales?utm_source=dinner_planner&utm_medium=tripwire&utm_campaign=paid_planner_v1';

  const [copied, setCopied] = useState(false);
  const copyLink = async () => {
    track('lm_copy_link');
    try {
      await navigator.clipboard.writeText(PLANNER_URL);
      setCopied(true);
      setTimeout(() => setCopied(false), 1800);
    } catch (e) {
      // Fallback for older browsers / iOS quirks
      try {
        const ta = document.createElement('textarea');
        ta.value = PLANNER_URL;
        ta.setAttribute('readonly', '');
        ta.style.position = 'absolute';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        setCopied(true);
        setTimeout(() => setCopied(false), 1800);
      } catch (err) {
        // Last resort: show the URL so the user can copy it manually
        prompt('Copy this link:', PLANNER_URL);
      }
    }
  };

  const handleReset = () => {
    track('lm_reset_click');
    if (typeof window !== 'undefined' && window.confirm('Start a new plan? This clears your current week.')) {
      onReset();
    }
  };

  return (
    <>
      {/* PLAN INTRO — light header, no dark block */}
      <div className="plan-intro">
        <div className="eyebrow">{weekOfString(weekOffset)}</div>
        <h1 className="h1">Your week. Planned.</h1>

          Built for <strong>{householdLabel}</strong>.
          {' '}{cookCount} dinner{cookCount === 1 ? '' : 's'} planned.
          {' '}One shopping trip.
        </p>
      </div>

      {/* WIN CALLOUT — time-saved headline, main value prop */}
      <div className="win-callout">
        <div className="win-callout-icon">⏱</div>
        <div className="win-callout-body">
          <div className="win-callout-headline">
            {cookCount} dinner{cookCount === 1 ? '' : 's'} planned in 1 minute.
          </div>
          <div className="win-callout-sub">
            That's <strong>{timeSavedStr} saved this week</strong> — no more 6pm "what's for dinner?"
            (at ~30 minutes back per dinner: deciding, searching, scrambling).
          </div>
        </div>
      </div>

      {/* PLAN CARD — hi-fi header bar */}
      <div className="plan-card">
        <div className="plan-card-header">
          <h3>Your week</h3>
          <div className="eyebrow">{cookCount} dinner{cookCount === 1 ? '' : 's'}</div>
        </div>
        {plan.map((row, i) => {
          const open = !!openIngredients[row.day];
          return (
            <div key={row.day} className="plan-entry">
              <div className="plan-row">
                <div className="plan-day">
                  <div className="day-code">{row.short}</div>
                  <span className="date">{row.date}</span>
                </div>
                <div className="plan-meal">
                  <div className="plan-title">
                    {row.meal.title}
                  </div>

                </div>
              </div>
              <div className={`recipe ${open ? 'open' : ''}`}>
                <button
                  type="button"
                  className="recipe-toggle no-print"
                  onClick={() => toggleIngredients(row.day)}
                  aria-expanded={open}
                >
                  {open ? '▼ Hide ingredients' : '▶ Show ingredients'}
                </button>
                <ul className="recipe-ingredients">
                  {row.meal.ingredients.map((ing, j) => (
                    <li key={j}>
                      <span className="ing-name">{ing.name}</span>
                      <span className="ing-qty">{ing.qty}</span>

                <ol className="recipe-steps">
                  {row.meal.steps.map((s, j) => <li key={j}>{s}</li>)}

      {/* GROCERY CARD — hi-fi header bar */}

                const k = `${cat}::${item.name}`;
                const isChecked = !!checked[k];

                    <div className="check" style={isChecked ? { background: 'var(--cobalt-600)', borderColor: 'var(--cobalt-600)' } : {}}>
                      {isChecked && <CheckIcon/>}
                    </div>
                    <span>{item.name}</span>

                );
              })}

        </div>
        <div className="grocery-assumes">

        <button className="cta cta-ghost" onClick={handleReset}>↺ Start over</button>
      </div>

      <div className="footer-meta">
        Meal Planning OS · Built from 300,000+ meals
      </div>
    </>
  );
}

function App() {
  // Hydrate from localStorage on first render. If no saved state, defaults apply
  // and showIntro stays true (first-time visitor sees the explainer modal).
  const initial = loadState();

  const [step, setStep] = useState(initial?.step || 1);
  const [household, setHousehold] = useState(initial?.household || null);
  const [nights, setNights] = useState(initial?.nights || new Set());
  const [selections, setSelections] = useState(initial?.selections || {});
  const [cookIdx, setCookIdx] = useState(0);
  const [showIntro, setShowIntro] = useState(!initial); // skip intro on return visits
  const [planStartAt, setPlanStartAt] = useState(null); // ms when user clicked Start
  const [weekOffset, setWeekOffset] = useState(initial?.weekOffset || 0);
  // Lifted from Step5Plan so grocery checkmarks survive a refresh — keyed by
  // `${cat}::${name}` (e.g. "PRODUCE::Garlic"). Orphaned keys (from edited
  // selections) are harmless: they just don't render against any current row.
  const [checked, setChecked] = useState(initial?.checked || {});

  useEffect(() => { track('lm_view'); }, []);
  useEffect(() => {
    track('lm_step', { step });
    if (typeof window !== 'undefined') window.scrollTo({ top: 0, behavior: 'smooth' });
  }, [step]);

  // Persist plan state to localStorage on every relevant change. cookIdx and
  // showIntro are intentionally NOT persisted — they're transient UI state.
  useEffect(() => {
    saveState({ step, household, nights, selections, weekOffset, checked });
  }, [step, household, nights, selections, weekOffset, checked]);

  const toggleNight = (key) => {
    setNights(prev => {
      const next = new Set(prev);
      if (next.has(key)) next.delete(key);
      else next.add(key);
      return next;
    });
  };

  const pickTheme = (day, theme) => {
    setSelections(prev => {
      const prior = prev[day] || {};
      // If theme changed, clear the meal
      const meal = prior.theme === theme ? prior.meal : null;
      return { ...prev, [day]: { theme, meal } };
    });
    track('lm_theme_selected', { day, theme });
  };

  const pickMeal = (day, meal) => {
    setSelections(prev => ({ ...prev, [day]: { ...(prev[day] || {}), meal } }));
    track('lm_meal_selected', { day, meal });
  };

  // Full reset — wipes all plan state, clears localStorage, returns to step 1.
  // Used by the "Start over" button on the final page. We do NOT re-show the
  // intro modal: a paid customer who's seen the planner once doesn't need the
  // explainer every time they replan. Scroll resets via the existing step
  // effect. clearState before setStep so persistence useEffect doesn't re-save
  // the half-cleared state mid-update.
  const reset = () => {
    clearState();
    setStep(1);
    setHousehold(null);
    setNights(new Set());
    setSelections({});
    setCookIdx(0);
    setWeekOffset(0);
    setChecked({});
    setPlanStartAt(Date.now());
  };

  const TOTAL = 5;

  return (
    <div className="page">
      {showIntro && (
        <IntroModal
          onStart={() => {
            setShowIntro(false);
            setPlanStartAt(Date.now());
            track('lm_intro_dismissed');
          }}
        />
      )}
      <Header step={step} weekOffset={weekOffset} onWeekChange={setWeekOffset} />
      {step < TOTAL && <Progress step={step} totalSteps={TOTAL} />}
      {step === 1 && (
        <Step1Household
          value={household}
          onPick={(k) => { setHousehold(k); track('lm_household_selected', { household: k }); }}
          onNext={() => setStep(2)}
        />
      )}
      {step === 2 && (
        <Step2Nights
          nights={nights}
          onToggle={toggleNight}
          onNext={() => {
            track('lm_nights_selected', { count: nights.size, nights: Array.from(nights) });
            setCookIdx(0);
            setStep(3);
          }}
          onBack={() => setStep(1)}
        />
      )}
      {step === 3 && (
        <Step3Themes
          nights={nights}
          selections={selections}
          onPickTheme={pickTheme}
          cookIdx={cookIdx}
          onIdxChange={setCookIdx}
          onNext={() => { setCookIdx(0); setStep(4); }}
          onBack={() => setStep(2)}
        />
      )}
      {step === 4 && (
        <Step4Meals
          nights={nights}
          selections={selections}
          onPickMeal={pickMeal}
          cookIdx={cookIdx}
          onIdxChange={setCookIdx}
          onNext={() => setStep(5)}
          onBack={() => { setCookIdx(0); setStep(3); }}
        />
      )}
      {step === 5 && (
        <Step5Plan
          nights={nights}
          selections={selections}
          household={household}
          weekOffset={weekOffset}
          checked={checked}
          setChecked={setChecked}
          onBack={() => { setCookIdx(0); setStep(4); }}
          onReset={reset}
        />
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
