<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" content="#1E5EFF" />
  <title>Meal Planning OS — Admin</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent:        #1E5EFF;
      --accent-dark:   #1449D4;
      --accent-light:  #EBF2FF;
      --accent-mid:    #BFCFFF;
      --bg:            #F4F7FF;
      --surface:       #FFFFFF;
      --surface-2:     #F0F4FF;
      --border:        #DDE4F0;
      --border-dark:   #C4CFEA;
      --text:          #0D1829;
      --text-2:        #4A5878;
      --text-3:        #8A97B8;
      --green:         #0F9F6E;
      --green-light:   #E8F8F3;
      --purple:        #6B4ECC;
      --purple-light:  #F0ECFF;
      --yellow:        #D97706;
      --yellow-light:  #FFF8EB;
      --red:           #DC2626;
      --red-light:     #FEF2F2;
      --radius:        10px;
      --radius-sm:     7px;
      --shadow:        0 1px 4px rgba(30,60,120,0.08);
      --shadow-md:     0 4px 16px rgba(30,60,120,0.12);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { overflow-x: hidden; max-width: 100vw; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.5;
    }
    a { color: var(--accent); text-decoration: none; }

    /* ── HEADER ── */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      gap: 12px;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-svg { width: 34px; height: 34px; flex-shrink: 0; }
    .logo-text { font-size: 15px; font-weight: 800; letter-spacing: -0.4px; white-space: nowrap; }
    .logo-text span { color: var(--accent); }
    .admin-badge {
      font-size: 11px; font-weight: 700; letter-spacing: 0.6px;
      text-transform: uppercase;
      background: var(--accent-light); color: var(--accent);
      padding: 4px 10px; border-radius: 20px; margin-left: 4px;
    }
    .header-actions { display: flex; gap: 8px; align-items: center; }
    .btn {
      font-family: inherit; font-size: 13px; font-weight: 600;
      border-radius: var(--radius-sm); cursor: pointer;
      padding: 8px 14px; border: 1px solid var(--border);
      background: var(--surface); color: var(--text-2);
      transition: all .15s ease;
    }
    .btn:hover { border-color: var(--border-dark); color: var(--text); }
    .btn-primary {
      background: var(--accent); color: #fff; border-color: var(--accent);
    }
    .btn-primary:hover { background: var(--accent-dark); border-color: var(--accent-dark); color: #fff; }

    /* ── MAIN ── */
    main { max-width: 1200px; margin: 0 auto; padding: 28px 20px 60px; }
    .generated {
      font-size: 12px; color: var(--text-3);
      margin-bottom: 22px;
    }
    .note {
      background: var(--accent-light); color: var(--accent-dark);
      border: 1px solid var(--accent-mid);
      padding: 10px 14px; border-radius: var(--radius-sm);
      font-size: 12px; margin-bottom: 22px;
    }

    .section-title {
      font-size: 11px; font-weight: 700; color: var(--text-3);
      text-transform: uppercase; letter-spacing: 0.8px;
      margin: 32px 0 12px;
    }
    .section-title:first-child { margin-top: 0; }

    .grid { display: grid; gap: 14px; }
    .kpis { grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow);
    }
    .card-title {
      font-size: 11px; font-weight: 700; color: var(--text-3);
      text-transform: uppercase; letter-spacing: 0.6px;
      margin-bottom: 8px;
    }
    .kpi .value {
      font-size: 28px; font-weight: 800; color: var(--text);
      letter-spacing: -0.5px;
      font-variant-numeric: tabular-nums;
    }
    .kpi .sub {
      font-size: 12px; color: var(--text-3); margin-top: 4px;
    }
    .kpi.accent .value { color: var(--accent); }
    .kpi.green  .value { color: var(--green); }
    .kpi.purple .value { color: var(--purple); }
    .kpi.yellow .value { color: var(--yellow); }

    .charts { grid-template-columns: 1fr 1fr; margin-top: 4px; }
    @media (max-width: 860px) { .charts { grid-template-columns: 1fr; } }
    .chart-card { padding: 20px; }
    .chart-wrap { position: relative; width: 100%; height: 180px; }
    .chart-wrap.tall { height: 260px; }
    .chart-wrap canvas { position: absolute; inset: 0; width: 100% !important; height: 100% !important; display: block; }

    .two-col { grid-template-columns: 1fr 1fr; }
    @media (max-width: 860px) { .two-col { grid-template-columns: 1fr; } }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { text-align: left; padding: 10px 8px; border-bottom: 1px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    th {
      color: var(--text-3); font-weight: 600; font-size: 10px;
      text-transform: uppercase; letter-spacing: 0.6px;
    }
    td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
    td.email { color: var(--text); font-weight: 500; }

    .ret-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 0; border-bottom: 1px solid var(--border);
    }
    .ret-row:last-of-type { border-bottom: none; }
    .ret-row .label { font-weight: 600; color: var(--text); font-size: 13px; }
    .ret-row .pct { font-size: 20px; font-weight: 800; color: var(--accent); font-variant-numeric: tabular-nums; }
    .ret-row .denom { color: var(--text-3); font-size: 12px; margin-left: 6px; }

    /* ── Roster status pills ── */
    .pill {
      display: inline-block; font-size: 10px; font-weight: 700;
      letter-spacing: 0.5px; text-transform: uppercase;
      padding: 3px 8px; border-radius: 20px;
    }
    .pill.active   { background: var(--green-light);  color: var(--green); }
    .pill.slipping { background: var(--yellow-light); color: var(--yellow); }
    .pill.drifted  { background: var(--red-light);    color: var(--red); }
    .pill.never    { background: var(--surface-2);    color: var(--text-3); }

    .roster-table td { padding: 12px 10px; font-size: 13px; }
    .roster-table tr.status-active   { background: rgba(15,159,110,0.03); }
    .roster-table tr.status-slipping { background: rgba(217,119,6,0.04); }
    .roster-table tr.status-drifted  { background: rgba(220,38,38,0.04); }
    .roster-table tr.status-never    { background: transparent; opacity: 0.82; }
    .roster-table td.center, .roster-table th.center { text-align: center; }
    .roster-table .tick { color: var(--green); font-weight: 700; }
    .roster-table .dash { color: var(--text-3); }

    .roster-legend {
      display: flex; gap: 12px; flex-wrap: wrap;
      font-size: 11px; color: var(--text-3); margin-top: 10px;
    }
    .roster-legend .pill { font-size: 9px; padding: 2px 7px; }

    /* ── Roster: mobile card layout ────────────────────────────── */
    /* On narrow screens the table becomes a stack of cards: each row is a
       self-contained block with the column name shown as a label. */
    .mobile-refresh-wrap { display: none; }
    @media (max-width: 720px) {
      .header-actions #refreshBtn { display: none; }
      .mobile-refresh-wrap {
        display: flex;
        justify-content: center;
        margin-top: 24px;
        padding-bottom: 20px;
      }
      .mobile-refresh-wrap .btn {
        width: 100%;
        max-width: 320px;
        padding: 14px 18px;
        font-size: 15px;
      }
      .roster-table { display: block; }
      .roster-table thead { display: none; }
      .roster-table tbody { display: block; }
      .roster-table tr {
        display: block;
        padding: 14px 16px;
        border-bottom: 1px solid var(--border);
      }
      .roster-table tr:last-child { border-bottom: none; }
      .roster-table tr.status-active,
      .roster-table tr.status-slipping,
      .roster-table tr.status-drifted,
      .roster-table tr.status-never { background: transparent; }
      .roster-table tr.status-active   { border-left: 3px solid var(--green); }
      .roster-table tr.status-slipping { border-left: 3px solid var(--yellow); }
      .roster-table tr.status-drifted  { border-left: 3px solid var(--red); }
      .roster-table tr.status-never    { border-left: 3px solid var(--border); }
      .roster-table td {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 4px 0 !important;
        border-bottom: none;
        font-size: 13px;
        text-align: left !important;
      }
      .roster-table td::before {
        content: attr(data-label);
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--text-3);
        margin-right: 12px;
      }
      /* Email is the "title" of each card — no label, full width, bold. */
      .roster-table td.email {
        font-size: 15px;
        font-weight: 700;
        color: var(--text);
        padding: 0 0 6px 0 !important;
        display: block;
        word-break: break-all;
      }
      .roster-table td.email::before { display: none; }
      /* Status pill sits on its own row right under the email. */
      .roster-table td[data-label="Status"] { padding-bottom: 8px !important; }
      .roster-table td[data-label="Status"]::before { display: none; }
      .roster-table td[data-label="Status"] { justify-content: flex-start; }
      /* Onboarded cell: show tick/dash inline with the label. */
      .roster-table td.center { text-align: left !important; }
      .roster-legend { padding: 12px 16px !important; font-size: 10px; }
      .roster-legend span { white-space: nowrap; }
      main { padding: 20px 14px 60px; }
      .card { padding: 14px; }
      .kpis { grid-template-columns: repeat(2, 1fr); }
      .kpi .value { font-size: 22px; }
    }

    /* ── CHANGELOG (accordion) ── */
    .changelog { display: flex; flex-direction: column; gap: 8px; }
    .changelog-entry {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .changelog-entry > summary {
      list-style: none; cursor: pointer; user-select: none;
      padding: 12px 18px;
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      transition: background .15s ease;
    }
    .changelog-entry > summary::-webkit-details-marker { display: none; }
    .changelog-entry > summary:hover { background: var(--surface-2); }
    .changelog-entry > summary::after {
      content: '▸';
      color: var(--text-3); font-size: 14px;
      margin-left: auto;
      transition: transform .2s ease;
    }
    .changelog-entry[open] > summary::after { transform: rotate(90deg); }
    .changelog-entry[open] > summary { border-bottom: 1px solid var(--border); }
    .changelog-body { padding: 12px 18px 16px; }
    .changelog-date {
      font-size: 12px; font-weight: 700;
      color: var(--text-3); font-variant-numeric: tabular-nums;
      letter-spacing: 0.3px;
    }
    .changelog-title {
      font-size: 14px; font-weight: 700; color: var(--text); flex: 1;
    }
    .tag {
      font-size: 10px; font-weight: 700; letter-spacing: 0.6px;
      text-transform: uppercase; padding: 3px 8px; border-radius: 20px;
    }
    .tag-feature { background: var(--accent-light); color: var(--accent); }
    .tag-fix     { background: var(--yellow-light); color: var(--yellow); }
    .tag-admin   { background: var(--purple-light); color: var(--purple); }
    .tag-chore   { background: var(--surface-2); color: var(--text-2); }
    .changelog-items {
      list-style: none; padding-left: 0; margin: 0;
    }
    .changelog-items li {
      position: relative;
      padding: 4px 0 4px 18px;
      font-size: 13px; color: var(--text-2); line-height: 1.55;
    }
    .changelog-items li::before {
      content: ""; position: absolute; left: 4px; top: 13px;
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--accent-mid);
    }
    .changelog-items li strong { color: var(--text); font-weight: 600; }
    .changelog-items li em { font-style: italic; color: var(--text-2); }

    /* ── STATUS / LOGIN ── */
    .status {
      padding: 60px 24px; text-align: center; color: var(--text-3);
      font-size: 14px;
    }
    .status.error { color: var(--red); }

    .login-wrap {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .login-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
      padding: 32px;
      width: 100%; max-width: 380px;
    }
    .login-logo {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      margin-bottom: 20px;
    }
    .login-logo .logo-text { font-size: 17px; }
    .login-title {
      font-size: 20px; font-weight: 800; letter-spacing: -0.5px;
      text-align: center; margin-bottom: 6px;
    }
    .login-sub {
      font-size: 13px; color: var(--text-3);
      text-align: center; margin-bottom: 22px;
    }
    .login-box label {
      display: block; font-size: 11px; font-weight: 700; color: var(--text-3);
      text-transform: uppercase; letter-spacing: 0.6px;
      margin: 12px 0 6px;
    }
    .login-box input {
      width: 100%; padding: 11px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font: inherit; font-size: 14px; color: var(--text);
      transition: border-color .15s;
    }
    .login-box input:focus {
      outline: none; border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-light);
    }
    .login-box button {
      width: 100%; margin-top: 20px; padding: 12px;
      font-family: inherit; font-size: 14px; font-weight: 700;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius-sm);
      cursor: pointer; transition: background .15s;
    }
    .login-box button:hover { background: var(--accent-dark); }
    .login-err {
      color: var(--red); font-size: 12px; font-weight: 500;
      margin-top: 12px; min-height: 16px; text-align: center;
    }
  </style>

<body>

  <div id="app">
    <div class="status">Loading…</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script>
    const SUPABASE_URL = 'https://vgtsxthotnnvknrqyhec.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_lq13XvUG9YsoiHrU8p36qg_EXE0vo8f';
    const _sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const root = document.getElementById('app');

    // Brand-matched logo (grid style), used in header + login.
    const LOGO_SVG = `
      <svg class="logo-svg" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
          <clipPath id="logoClip"><rect x="2" y="2" width="36" height="36" rx="8"/></clipPath>
        </defs>
        <rect x="2" y="2" width="36" height="36" rx="8" fill="#fff" stroke="#0D1829" stroke-width="2.5"/>
        <g stroke="#0D1829" stroke-width="2" clip-path="url(#logoClip)">
          <line x1="14" y1="2" x2="14" y2="38"/>
          <line x1="26" y1="2" x2="26" y2="38"/>
          <line x1="2" y1="14" x2="38" y2="14"/>
          <line x1="2" y1="26" x2="38" y2="26"/>
        </g>
      </svg>`;

    const logoBlock = `
      <div class="logo">
        ${LOGO_SVG}
        <span class="logo-text">Meal Planning <span>OS</span></span>
      </div>`;

    // ── Boot ────────────────────────────────────────────────────────────
    (async function init() {
      const { data: { session } } = await _sb.auth.getSession();
      if (!session) return renderLogin();
      await loadDashboard(session);
    })();

    // ── Login screen ────────────────────────────────────────────────────
    function renderLogin(errMsg) {
      root.innerHTML = `
        <div class="login-wrap">
          <div class="login-box">
            <div class="login-logo">${LOGO_SVG}<span class="logo-text">Meal Planning <span>OS</span></span></div>
            <div class="login-title">Admin</div>
            <div class="login-sub">Sign in to view dashboard</div>
            <form id="loginForm">
              <label for="email">Email</label>
              <input id="email" type="email" autocomplete="email" required />
              <label for="password">Password</label>
              <input id="password" type="password" autocomplete="current-password" required />
              <button type="submit">Sign in</button>
              <div class="login-err" id="loginErr">${errMsg || ''}</div>
            </form>
          </div>
        </div>
      `;
      document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const errEl = document.getElementById('loginErr');
        errEl.textContent = 'Signing in…';
        const { data, error } = await _sb.auth.signInWithPassword({ email, password });
        if (error) { errEl.textContent = error.message; return; }
        await loadDashboard(data.session);
      });
    }

    // ── Fetch + render dashboard ────────────────────────────────────────
    async function loadDashboard(session) {
      root.innerHTML = `<div class="status">Loading stats…</div>`;
      let stats, changelog = [];
      try {
        const [statsRes, changelogRes] = await Promise.all([
          fetch('/.netlify/functions/admin-stats', {
            headers: { Authorization: `Bearer ${session.access_token}` },
          }),
          fetch('/changelog.json', { cache: 'no-store' }),
        ]);
        if (statsRes.status === 401 || statsRes.status === 403) {
          await _sb.auth.signOut();
          return renderLogin('Not authorized as admin.');
        }
        if (!statsRes.ok) throw new Error(`Stats HTTP ${statsRes.status}`);
        stats = await statsRes.json();
        if (changelogRes.ok) {
          try { changelog = await changelogRes.json(); } catch (_) { changelog = []; }
        }
      } catch (err) {
        root.innerHTML = `<div class="status error">Failed to load: ${err.message}</div>`;
        return;
      }
      render(stats, changelog);
    }

    // ── Render ──────────────────────────────────────────────────────────
    function render(d, changelog) {
      const s = d.summary, f = d.features, r = d.retention;
      const fmt = (n) => (n ?? 0).toLocaleString();
      const kpi = (title, value, sub = '', tint = '') => `
        <div class="card kpi ${tint}">
          <div class="card-title">${title}</div>
          <div class="value">${value}</div>
          <div class="sub">${sub}</div>
        </div>`;

      const roster = d.userRoster || [];
      const counts = roster.reduce((acc, u) => {
        acc[u.status] = (acc[u.status] || 0) + 1;
        return acc;
      }, {});
      const retLine = (pct, denom) => denom > 0
        ? `<span class="pct">${pct}%</span><span class="denom">of ${denom}</span>`
        : `<span class="pct" style="color:var(--text-3)">—</span><span class="denom">nobody eligible yet</span>`;

      root.innerHTML = `
        <div class="header">
          <div class="header-inner">
            ${logoBlock}
            <span class="admin-badge">Admin</span>
            <div style="flex:1"></div>
            <div class="header-actions">
              <button class="btn" id="refreshBtn">↻ Refresh</button>
              <button class="btn" id="signOutBtn">Sign out</button>
            </div>
          </div>
        </div>

        <main>
          <div class="generated">Updated ${new Date(d.generatedAt).toLocaleString()}</div>

          <div class="grid kpis">
            ${kpi('Total users',    fmt(s.totalUsers),     `${fmt(s.betaUsers)} beta · ${fmt(s.paidUsers)} paid`, 'accent')}
            ${kpi('New this week',  fmt(s.newUsers7),      `${fmt(s.newUsers30)} in last 30 days`, 'green')}
            ${kpi('Active today',   fmt(s.loggedInToday),  'logged in in last 24h')}
            ${kpi('Active (7d)',    fmt(s.loggedIn7),      `${fmt(s.loggedIn30)} in last 30 days`)}
          </div>

          <div class="grid charts">
            <div class="card chart-card">
              <div class="card-title">Signups per day · 30d</div>
              <div class="chart-wrap"><canvas id="signupsChart"></canvas></div>
            </div>
            <div class="card chart-card">
              <div class="card-title">Logins per day · 30d</div>
              <div class="chart-wrap"><canvas id="loginsChart"></canvas></div>
            </div>
          </div>

          <div class="section-title">Activation funnel</div>
          <div class="card">
            <div class="card-title">Signup → built groceries</div>
            <div class="chart-wrap tall"><canvas id="funnelChart"></canvas></div>
          </div>

          <div class="section-title">User roster</div>
          <div class="card" style="padding:0">
            <table class="roster-table">
              <thead>
                <tr>
                  <th style="padding-left:18px">Email</th>
                  <th>Status</th>
                  <th class="num">Last seen</th>
                  <th class="num">Signed up</th>
                  <th class="num">Login days</th>
                  <th class="num" title="Recipes beyond the 3 auto-seeded starters">Own recipes</th>
                  <th class="num" title="Meal plan slots filled">Meals planned</th>
                  <th class="num" title="Groceries added beyond default staples/flex">Groceries</th>
                  <th class="center" title="V4 Quick Start completed">V4</th>
                  <th class="center" title="V4.5 Learn More completed">V4.5</th>
                </tr>
              </thead>
              <tbody>
                ${roster.length ? roster.map(u => `
                  <tr class="status-${u.status}">
                    <td class="email" style="padding-left:18px">${escapeHtml(u.email || '(no email)')}</td>
                    <td data-label="Status"><span class="pill ${u.status}">${u.status}</span></td>
                    <td class="num" data-label="Last seen" style="color:var(--text-2)">${u.lastLogin ? relativeTime(u.lastLogin) : '<span class="dash">never</span>'}</td>
                    <td class="num" data-label="Signed up" style="color:var(--text-3)">${relativeTime(u.signedUpAt)}</td>
                    <td class="num" data-label="Login days">${u.loginDays}</td>
                    <td class="num" data-label="Own recipes">${u.recipes}</td>
                    <td class="num" data-label="Meals planned">${u.assignments}</td>
                    <td class="num" data-label="Groceries">${u.groceries ?? 0}</td>
                    <td class="center" data-label="V4">${u.onboarded ? '<span class="tick">✓</span>' : '<span class="dash">—</span>'}</td>
                    <td class="center" data-label="V4.5">${u.learnMoreDone ? '<span class="tick">✓</span>' : '<span class="dash">—</span>'}</td>
                  </tr>
                `).join('') : '<tr><td colspan="10" style="color:var(--text-3);text-align:center;padding:24px">No users yet.</td></tr>'}
              </tbody>
            </table>
            <div class="roster-legend" style="padding:10px 18px 14px">
              <span><span class="pill active">active</span> logged in in last 7 days (${counts.active || 0})</span>
              <span><span class="pill slipping">slipping</span> 8–14 days (${counts.slipping || 0})</span>
              <span><span class="pill drifted">drifted</span> 15+ days (${counts.drifted || 0})</span>
              <span><span class="pill never">never</span> no login in 30d (${counts.never || 0})</span>
            </div>
          </div>

          <div class="section-title">Retention & totals</div>
          <div class="grid two-col">
            <div class="card">
              <div class="card-title">Login retention</div>
              <div class="ret-row">
                <span class="label">Day 1</span>
                <span>${retLine(r.day1, r.eligible.d1)}</span>
              </div>
              <div class="ret-row">
                <span class="label">Day 7</span>
                <span>${retLine(r.day7, r.eligible.d7)}</span>
              </div>
              <div class="ret-row">
                <span class="label">Day 30</span>
                <span>${retLine(r.day30, r.eligible.d30)}</span>
              </div>
              <div style="font-size:11px;color:var(--text-3);margin-top:12px;line-height:1.5">
                % of eligible users who logged in again at least N days after signup.
              </div>
            </div>
            <div class="card">
              <div class="card-title">What users actually built</div>
              <div class="ret-row">
                <span class="label">Own recipes added</span>
                <span><span class="pct">${fmt(f.totalRecipes)}</span><span class="denom">${f.usersWithRecipes} users</span></span>
              </div>
              <div class="ret-row">
                <span class="label">Meals planned</span>
                <span><span class="pct">${fmt(f.totalAssignments)}</span><span class="denom">${f.usersWithAssignments} users</span></span>
              </div>
              <div class="ret-row">
                <span class="label">Grocery items</span>
                <span><span class="pct">${fmt(f.totalGroceryItems)}</span><span class="denom">${f.usersWithGroceries} users</span></span>
              </div>
              <div class="ret-row">
                <span class="label">Freezer items</span>
                <span><span class="pct">${fmt(f.totalFreezerItems)}</span><span class="denom">${f.usersWithFreezer} users</span></span>
              </div>
              <div style="font-size:11px;color:var(--text-3);margin-top:12px;line-height:1.5">
                Excludes the 3 seed recipes and default staples/flex items every new account gets automatically.
              </div>
            </div>
          </div>

          <div class="section-title">Changelog</div>
          <div class="changelog">
            ${changelog && changelog.length
              ? changelog.map(renderChangelogEntry).join('')
              : '<div class="card" style="color:var(--text-3)">No changelog entries yet. Edit <code>changelog.json</code> in the repo to add them.</div>'}
          </div>

          <div style="font-size:11px;color:var(--text-3);margin-top:30px;text-align:center;line-height:1.6">
            ${fmt(s.totalBackups)} auto-backups saved across all users (safety net, not an engagement signal)
          </div>

          <div class="mobile-refresh-wrap">
            <button class="btn" id="refreshBtnBottom">↻ Refresh</button>
          </div>
        </main>
      `;

      const _refreshHandler = async () => {
        const { data: { session } } = await _sb.auth.getSession();
        if (session) loadDashboard(session);
      };
      document.getElementById('refreshBtn').addEventListener('click', _refreshHandler);
      const _bottomRefresh = document.getElementById('refreshBtnBottom');
      if (_bottomRefresh) _bottomRefresh.addEventListener('click', _refreshHandler);
      document.getElementById('signOutBtn').addEventListener('click', async () => {
        await _sb.auth.signOut();
        renderLogin();
      });

      drawLineChart('signupsChart', d.series.signupsByDay);
      drawLineChart('loginsChart',  d.series.loginsByDay);
      drawFunnelChart('funnelChart', d.funnel || [], d.funnelTotal || s.totalUsers || 0);
    }

    function drawFunnelChart(canvasId, funnel, total) {
      const canvas = document.getElementById(canvasId);
      if (!canvas) return;
      Chart.getChart(canvas)?.destroy();
      const ctx = canvas.getContext('2d');
      const labels = funnel.map(f => f.step);
      const values = funnel.map(f => f.count);
      const denom = total || 1;
      const pcts  = values.map(v => Math.round((v / denom) * 100));
      new Chart(ctx, {
        type: 'bar',
        data: {
          labels,
          datasets: [{
            data: values,
            backgroundColor: 'rgba(30, 94, 255, 0.85)',
            borderColor: '#1E5EFF',
            borderWidth: 0,
            borderRadius: 6,
            barThickness: 22,
          }],
        },
        options: {
          indexAxis: 'y',
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: '#0D1829',
              titleFont: { family: 'Inter', weight: '600', size: 12 },
              bodyFont:  { family: 'Inter', weight: '500', size: 12 },
              padding: 10, displayColors: false,
              callbacks: {
                label: (c) => `${c.raw} of ${denom} users (${pcts[c.dataIndex]}%)`,
              },
            },
          },
          scales: {
            x: {
              ticks: { color: '#8A97B8', precision: 0, font: { family: 'Inter', size: 11 } },
              grid:  { color: '#EBF2FF' },
              border: { display: false },
              beginAtZero: true,
            },
            y: {
              ticks: { color: '#38466A', font: { family: 'Inter', size: 12, weight: '600' } },
              grid:  { display: false },
              border: { color: '#DDE4F0' },
            },
          },
        },
      });
    }

    function renderChangelogEntry(entry, idx) {
      const type = (entry.type || 'chore').toLowerCase();
      const date = entry.date
        ? new Date(entry.date + 'T12:00:00Z').toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' })
        : '';
      const items = Array.isArray(entry.items) ? entry.items : [];
      // First (most recent) entry is expanded by default, the rest collapsed.
      const openAttr = idx === 0 ? ' open' : '';
      return `
        <details class="changelog-entry"${openAttr}>
          <summary>
            <span class="changelog-date">${date}</span>
            <span class="tag tag-${type}">${type}</span>
            <span class="changelog-title">${escapeHtml(entry.title || '')}</span>
          </summary>
          <div class="changelog-body">
            <ul class="changelog-items">
              ${items.map(it => `<li>${sanitizeLight(it)}</li>`).join('')}
            </ul>
          </div>
        </details>`;
    }

    function drawLineChart(canvasId, byDay) {
      const canvas = document.getElementById(canvasId);
      if (!canvas) return;
      Chart.getChart(canvas)?.destroy();
      const ctx = canvas.getContext('2d');
      const h = canvas.clientHeight || 180;
      const gradient = ctx.createLinearGradient(0, 0, 0, h);
      gradient.addColorStop(0, 'rgba(30, 94, 255, 0.25)');
      gradient.addColorStop(1, 'rgba(30, 94, 255, 0.00)');
      const isoLabels = Object.keys(byDay);
      const values    = Object.values(byDay);
      const shortDate = (iso) => {
        const d = new Date(iso + 'T12:00:00Z');
        return (d.getMonth() + 1) + '/' + d.getDate();
      };
      const labels = isoLabels.map(shortDate);
      new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: [{
            data: values,
            borderColor: '#1E5EFF',
            backgroundColor: gradient,
            fill: true,
            tension: 0.35,
            pointRadius: 0,
            pointHoverRadius: 4,
            pointHoverBackgroundColor: '#1E5EFF',
            borderWidth: 2.5,
          }],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: '#0D1829',
              titleFont: { family: 'Inter', weight: '600', size: 12 },
              bodyFont:  { family: 'Inter', weight: '500', size: 12 },
              padding: 10, displayColors: false,
              callbacks: {
                title: (items) => {
                  const iso = isoLabels[items[0].dataIndex];
                  return new Date(iso + 'T12:00:00Z').toLocaleDateString(undefined, {
                    weekday: 'short', month: 'short', day: 'numeric',
                  });
                },
                label: (c) => `${c.raw}`,
              },
            },
          },
          scales: {
            x: {
              ticks: {
                color: '#8A97B8', maxTicksLimit: 6,
                font: { family: 'Inter', size: 11 },
              },
              grid: { display: false },
              border: { color: '#DDE4F0' },
            },
            y: {
              ticks: {
                color: '#8A97B8', precision: 0,
                font: { family: 'Inter', size: 11 },
              },
              grid: { color: '#EBF2FF' },
              border: { display: false },
              beginAtZero: true,
            },
          },
        },
      });
    }

    // ── helpers ─────────────────────────────────────────────────────────
    function escapeHtml(s) {
      return String(s ?? '').replace(/[&<>"']/g, c => (
        { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]
      ));
    }
    // Allow a very small, safe subset of markup in changelog items (<strong>, <em>, <code>).
    function sanitizeLight(s) {
      const escaped = escapeHtml(s);
      return escaped
        .replace(/&lt;(\/?)(strong|em|code)&gt;/g, '<$1$2>');
    }
    function relativeTime(iso) {
      if (!iso) return '—';
      const then = new Date(iso).getTime();
      const diff = Date.now() - then;
      const m = 60 * 1000, h = 60 * m, dMs = 24 * h;
      if (diff < h)    return Math.max(1, Math.round(diff / m)) + 'm ago';
      if (diff < dMs)  return Math.round(diff / h) + 'h ago';
      if (diff < 30 * dMs) return Math.round(diff / dMs) + 'd ago';
      return new Date(iso).toLocaleDateString();
    }
  </script>
</body>
</html>
