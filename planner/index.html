<style>
/* =============================================================================
   MPOS TOKENS (from mpos-tokens.css — verbatim)
   ============================================================================= */
:root {
  /* Cobalt */
  --cobalt-50:#eef2ff; --cobalt-100:#e0e7ff; --cobalt-200:#c7d2fe; --cobalt-300:#a5b4fc;
  --cobalt-400:#818cf8; --cobalt-500:#4f46e5; --cobalt-600:#2b3dd6; --cobalt-700:#1e2fb8;
  --cobalt-800:#1a2a9c; --cobalt-900:#0f1a6b;
  --cobalt:var(--cobalt-600);

  /* Ink */
  --ink-900:#0a0f1f; --ink-800:#111827; --ink-700:#1f2937; --ink-600:#374151;
  --ink-500:#6b7280; --ink-400:#9ca3af; --ink-300:#d1d5db; --ink-200:#e5e7eb;
  --ink-100:#f3f4f6; --ink-50:#f9fafb;

  /* Surfaces */
  --bg-page:#eef1fb; --bg-page-alt:#f5f7fd; --bg-surface:#ffffff;
  --bg-surface-2:#f7f9ff; --bg-inverse:#0a0f1f;

  /* Accents */
  --accent-status:#22c55e; --accent-warn:#f59e0b; --accent-event:#ef4444;

  /* Type */
  --font-sans:'Inter', ui-sans-serif, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  --font-mono:'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;

  /* Shadows */
  --shadow-1: 0 1px 2px rgba(15, 26, 107, 0.06), 0 1px 1px rgba(15, 26, 107, 0.04);
  --shadow-2: 0 2px 6px rgba(15, 26, 107, 0.08), 0 1px 2px rgba(15, 26, 107, 0.05);
  --shadow-3: 0 8px 24px rgba(15, 26, 107, 0.10), 0 2px 6px rgba(15, 26, 107, 0.06);
  --shadow-focus: 0 0 0 3px rgba(43, 61, 214, 0.25);
  --shadow-brand: 0 6px 16px rgba(43, 61, 214, 0.28);

  /* Motion */
  --ease-standard: cubic-bezier(0.2, 0, 0, 1);
  --dur-med: 200ms;
}

/* =============================================================================
   BASE
   ============================================================================= */
*,*::before,*::after { box-sizing: border-box; }
html,body { margin:0; padding:0; }
body {
  font-family: var(--font-sans);
  background: var(--bg-page);
  color: var(--ink-900);
  font-size: 15px;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

.page {
  max-width: 640px;
  margin: 0 auto;
  padding: 20px 20px 80px;
}

/* =============================================================================
   HEADER / LOGO
   ============================================================================= */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 0 24px;
}
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  color: inherit;
}
.logo-svg {
  width: 28px;
  height: 28px;
  flex-shrink: 0;
}
.logo-text {
  font-size: 15px;
  font-weight: 800;
  letter-spacing: -0.01em;
  color: var(--ink-900);
  line-height: 1;
}
.logo-text span { color: var(--cobalt-600); }
.header-meta {
  font-size: 11px;
  color: var(--ink-500);
  font-weight: 500;
  letter-spacing: 0.02em;
}

/* =============================================================================
   PROGRESS
   ============================================================================= */
.progress-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 28px;
}
.progress-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.08em;
  color: var(--cobalt-600);
  white-space: nowrap;
  text-transform: uppercase;
}
.progress-track {
  flex: 1;
  height: 3px;
  background: var(--ink-100);
  border-radius: 2px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--cobalt-600);
  transition: width var(--dur-med) var(--ease-standard);
}

/* =============================================================================
   TYPOGRAPHY BLOCKS
   ============================================================================= */
.eyebrow {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--cobalt-600);
  margin-bottom: 8px;
}
h1.h1 {
  font-size: 30px;
  line-height: 1.1;
  letter-spacing: -0.02em;
  font-weight: 800;
  color: var(--ink-900);
  margin: 0 0 10px;
}
@media (min-width: 520px) {
  h1.h1 { font-size: 34px; }
}
.sub {
  font-size: 15px;
  line-height: 1.5;
  color: var(--ink-600);
  margin: 0 0 20px;
  max-width: 540px;
}
/* =============================================================================
   CARDS / PICKERS
   ============================================================================= */
.option-list { display: grid; gap: 10px; margin: 0 0 24px; }

.option-card {
  background: var(--bg-surface);
  border: 1.5px solid var(--ink-200);
  border-radius: 12px;
  padding: 14px 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 12px;
  transition: all 140ms var(--ease-standard);
  box-shadow: var(--shadow-1);
  text-align: left;
  width: 100%;
  font-family: inherit;
  color: inherit;
}
.option-card:hover { border-color: var(--cobalt-300); }
.option-card:focus-visible { outline: none; box-shadow: var(--shadow-focus); }
.option-card.selected {
  border-color: var(--cobalt-600);
  background: var(--bg-surface);
  box-shadow: 0 0 0 3px rgba(43,61,214,0.12), var(--shadow-1);
}

.check {
  width: 22px;
  height: 22px;
  border-radius: 6px;
  border: 1.5px solid var(--ink-300);
  display: grid;
  place-items: center;
  flex-shrink: 0;
  background: var(--bg-surface);
  transition: all 120ms var(--ease-standard);
}
.option-card.selected .check {
  border-color: var(--cobalt-600);
  background: var(--cobalt-600);
}
.check svg { display: none; }
.option-card.selected .check svg { display: block; }

.option-body { flex: 1; min-width: 0; }
.option-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--ink-900);
  line-height: 1.25;
  margin-bottom: 2px;
}
.option-meta {
  font-size: 12.5px;
  color: var(--ink-500);
  font-weight: 500;
}
.option-badge {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--cobalt-600);
  padding: 2px 6px;
  background: var(--cobalt-50);
  border-radius: 4px;
  margin-left: 8px;
  white-space: nowrap;
}

/* =============================================================================
   CTAs
   ============================================================================= */
.cta-row {
  display: flex;
  gap: 10px;
  align-items: center;
  margin-top: 8px;
}
.cta {
  font-family: inherit;
  font-size: 15px;
  font-weight: 600;
  padding: 13px 20px;
  border-radius: 10px;
  cursor: pointer;
  border: none;
  transition: all 200ms var(--ease-standard);
}
.cta-primary {
  background: var(--cobalt-600);
  color: #fff;
  box-shadow: var(--shadow-brand);
  flex: 1;
}
.cta-primary:hover { background: var(--cobalt-700); }
.cta-primary:disabled {
  background: var(--ink-300);
  color: var(--ink-500);
  box-shadow: none;
  cursor: not-allowed;
}
.cta-ghost {
  background: #fff;
  color: var(--ink-900);
  border: 1px solid var(--ink-200);
}
.cta-ghost:hover { border-color: var(--ink-300); background: var(--bg-surface-2); }
.cta-text {
  background: none;
  border: none;
  color: var(--cobalt-600);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  padding: 8px 4px;
}
.cta-text:hover { color: var(--cobalt-700); }

.context-meta {
  font-size: 12.5px;
  color: var(--ink-500);
  margin-bottom: 14px;
  letter-spacing: 0.01em;
}
.context-meta .day-chip {
  display: inline-block;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.08em;
  padding: 3px 7px;
  background: var(--ink-100);
  border-radius: 4px;
  margin-right: 6px;
  color: var(--ink-700);
  text-transform: uppercase;
}

/* =============================================================================
   PLAN (STEP 5) — hi-fi light card with header bar
   ============================================================================= */
.plan-intro {
  margin: 0 0 16px;
}
.plan-intro .eyebrow { color: var(--cobalt-600); }
.plan-intro h1.h1 { margin-bottom: 8px; }
.plan-intro .sub {
  color: var(--ink-600);
  margin-bottom: 0;
}
.plan-intro .sub strong { color: var(--ink-900); font-weight: 700; }

.plan-card {
  background: var(--bg-surface);
  border: 1px solid var(--ink-200);
  border-radius: 12px;
  margin: 0 0 16px;
  box-shadow: var(--shadow-1);
  overflow: hidden;
}
.plan-card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 16px;
  border-bottom: 1px solid var(--ink-200);
}
.plan-card-header h3 {
  font-size: 14px;
  font-weight: 700;
  color: var(--ink-900);
  margin: 0;
  letter-spacing: -0.005em;
}
.plan-card-header .eyebrow {
  margin: 0;
  color: var(--ink-500);
}
.plan-row {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--ink-100);
  background: var(--bg-surface);
}
.plan-row:last-child { border-bottom: none; }
.plan-day {
  width: 42px;
  flex-shrink: 0;
  padding-top: 1px;
}
.plan-day .day-code {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.08em;
  color: var(--ink-900);
}
.plan-day .date {
  display: block;
  font-size: 10px;
  color: var(--ink-500);
  margin-top: 2px;
}
.plan-meal { flex: 1; min-width: 0; }
.plan-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--cobalt-600);
  line-height: 1.3;
}
.plan-theme {
  font-size: 11px;
  color: var(--ink-500);
  letter-spacing: 0.04em;
  margin-top: 2px;
}

/* Recipe collapsibles */
.recipe {
  padding: 0 16px 14px 70px;
  border-bottom: 1px solid var(--ink-100);
  font-size: 13px;
  line-height: 1.55;
  color: var(--ink-700);
  background: var(--bg-surface);
}
.recipe:last-child { border-bottom: none; }
.recipe-steps { margin: 0; padding: 0; list-style: none; counter-reset: step; }
.recipe-steps li {
  counter-increment: step;
  padding: 3px 0 3px 22px;
  position: relative;
}
.recipe-steps li::before {
  content: counter(step);
  position: absolute;
  left: 0;
  top: 3px;
  width: 16px;
  height: 16px;
  background: var(--cobalt-50);
  color: var(--cobalt-700);
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 700;
  border-radius: 4px;
  display: grid;
  place-items: center;
  line-height: 1;
}

/* Grocery card — hi-fi header bar */
.grocery-card {
  background: var(--bg-surface);
  border: 1px solid var(--ink-200);
  border-radius: 12px;
  margin: 0 0 20px;
  box-shadow: var(--shadow-1);
  overflow: hidden;
}
.grocery-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 16px;
  border-bottom: 1px solid var(--ink-200);
}
.grocery-header h3 {
  font-size: 14px;
  font-weight: 700;
  color: var(--ink-900);
  margin: 0;
  letter-spacing: -0.005em;
}
.grocery-header .eyebrow {
  margin: 0;
  color: var(--ink-500);
}
.grocery-body { padding: 14px 16px 16px; }
.grocery-section { margin-bottom: 14px; }
.grocery-section:last-child { margin-bottom: 0; }
.grocery-section h4 {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-900);
  margin: 0 0 8px;
}
.grocery-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 5px 0;
  font-size: 14px;
  cursor: pointer;
  user-select: none;
  color: var(--ink-700);
}
.grocery-item .check { width: 18px; height: 18px; border-radius: 4px; }
.grocery-item.checked { color: var(--ink-400); text-decoration: line-through; }
.grocery-item .qty {
  margin-left: auto;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--ink-500);
  font-weight: 500;
}
.grocery-assumes {
  font-size: 11px;
  color: var(--ink-500);
  padding: 12px 16px;
  border-top: 1px dashed var(--ink-200);
  line-height: 1.5;
  background: var(--bg-surface-2);
}

/* =============================================================================
   EMAIL CAPTURE — hi-fi dark inverse block
   ============================================================================= */
.capture {
  background: var(--bg-inverse);
  color: #fff;
  border-radius: 12px;
  padding: 22px 22px;
  margin: 0 0 20px;
  position: relative;
  overflow: hidden;
}
.capture::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 80% 0%, rgba(43,61,214,0.22) 0%, transparent 60%);
  pointer-events: none;
}
.capture > * { position: relative; z-index: 1; }
.capture .eyebrow {
  color: var(--cobalt-300);
  margin-bottom: 8px;
}
.capture h2 {
  font-size: 20px;
  line-height: 1.2;
  letter-spacing: -0.01em;
  font-weight: 800;
  color: #fff;
  margin: 0 0 8px;
}
.capture p {
  font-size: 13.5px;
  line-height: 1.5;
  color: rgba(255,255,255,0.68);
  margin: 0 0 14px;
}
/* Native subscribe form — posts to /.netlify/functions/subscribe → Beehiiv API */
.capture-form {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 4px;
}
.capture-input {
  width: 100%;
  padding: 13px 14px;
  font-family: inherit;
  font-size: 15px;
  line-height: 1.3;
  color: var(--ink-900);
  background: #fff;
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 10px;
  outline: none;
  transition: box-shadow 120ms ease, border-color 120ms ease;
}
.capture-input:focus {
  border-color: var(--cobalt-300);
  box-shadow: 0 0 0 3px rgba(124,138,255,0.35);
}
.capture-input:disabled { opacity: 0.7; cursor: not-allowed; }
.capture-submit {
  width: 100%;
  padding: 13px 14px;
  font-family: inherit;
  font-size: 15px;
  font-weight: 700;
  color: #fff;
  background: var(--cobalt-600, #2b3dd6);
  border: 1px solid var(--cobalt-600, #2b3dd6);
  border-radius: 10px;
  cursor: pointer;
  transition: transform 80ms ease, background 120ms ease, box-shadow 120ms ease;
}
.capture-submit:hover:not(:disabled) { background: #3a4cee; }
.capture-submit:active:not(:disabled) { transform: translateY(1px); }
.capture-submit:disabled { opacity: 0.7; cursor: not-allowed; }
.capture-error {
  font-size: 13px;
  color: #ffb4b4;
  margin-top: 2px;
}
.capture-success {
  font-size: 15px;
  font-weight: 600;
  color: rgba(255,255,255,0.85);
  text-align: center;
  padding: 14px 10px;
  margin-top: 4px;
  letter-spacing: -0.005em;
}

.save-hint {
  text-align: center;
  font-size: 12.5px;
  color: var(--ink-600);
  background: var(--bg-surface-2);
  padding: 10px 14px;
  border-radius: 8px;
  margin: 0 0 12px;
  line-height: 1.45;
}
.save-hint strong { color: var(--ink-900); font-weight: 700; }
.share-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
  margin: 0 0 24px;
}
.share-row button {
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  padding: 9px 14px;
  background: var(--bg-surface);
  color: var(--ink-700);
  border: 1px solid var(--ink-200);
  border-radius: 999px;
  cursor: pointer;
  box-shadow: var(--shadow-1);
}
.share-row button:hover { border-color: var(--ink-300); }
.share-row button.primary {
  background: var(--cobalt-600);
  color: #fff;
  border-color: var(--cobalt-600);
}
.share-row button.primary:hover { background: var(--cobalt-700); border-color: var(--cobalt-700); }

/* Win callout — the "you saved X hours" block */
.win-callout {
  background: var(--cobalt-50);
  border: 1px solid var(--cobalt-200);
  border-radius: 12px;
  padding: 14px 16px;
  margin: 0 0 16px;
  display: flex;
  align-items: center;
  gap: 14px;
}
.win-callout-icon {
  width: 36px;
  height: 36px;
  background: var(--cobalt-600);
  color: #fff;
  border-radius: 10px;
  display: grid;
  place-items: center;
  font-size: 18px;
  flex-shrink: 0;
}
.win-callout-body { flex: 1; }
.win-callout-headline {
  font-size: 14.5px;
  font-weight: 700;
  color: var(--ink-900);
  line-height: 1.3;
}
.win-callout-sub {
  font-size: 12px;
  color: var(--ink-600);
  margin-top: 2px;
  line-height: 1.4;
}

.footer-meta {
  text-align: center;
  font-size: 11px;
  color: var(--ink-400);
  margin-top: 30px;
  padding-top: 20px;
  border-top: 1px solid var(--ink-200);
}

/* =============================================================================
   NIGHTS PICKER — hi-fi day rows
   ============================================================================= */
.nights-list {
  display: grid;
  gap: 6px;
  margin: 0 0 16px;
}
.night-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  border-radius: 12px;
  border: 1.5px solid var(--ink-200);
  background: var(--bg-surface);
  box-shadow: var(--shadow-1);
  cursor: pointer;
  width: 100%;
  text-align: left;
  font-family: inherit;
  color: inherit;
  transition: all 140ms var(--ease-standard);
}
.night-row:hover { border-color: var(--cobalt-300); }
.night-row:focus-visible { outline: none; box-shadow: var(--shadow-focus); }
.night-row.selected {
  border-color: var(--cobalt-600);
  box-shadow: 0 2px 8px rgba(43,61,214,0.12);
}
.night-row-check {
  width: 22px;
  height: 22px;
  border-radius: 6px;
  border: 1.5px solid var(--ink-300);
  display: grid;
  place-items: center;
  flex-shrink: 0;
  background: #fff;
  transition: all 120ms var(--ease-standard);
}
.night-row.selected .night-row-check {
  border-color: var(--cobalt-600);
  background: var(--cobalt-600);
}
.night-row-check svg { display: none; }
.night-row.selected .night-row-check svg { display: block; }
.night-row-label {
  flex: 1;
  font-size: 15px;
  font-weight: 600;
  color: var(--ink-900);
}
.night-count {
  font-family: var(--font-sans);
  font-size: 13px;
  color: var(--ink-500);
  margin: 0 0 16px;
  min-height: 18px;
}

/* =============================================================================
   THEME GRID — 2-column hi-fi
   ============================================================================= */
.theme-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin: 0 0 16px;
}
.theme-card {
  padding: 14px 14px;
  border-radius: 12px;
  border: 1.5px solid var(--ink-200);
  background: var(--bg-surface);
  box-shadow: var(--shadow-1);
  cursor: pointer;
  text-align: left;
  font-family: inherit;
  color: inherit;
  transition: all 140ms var(--ease-standard);
}
.theme-card:hover { border-color: var(--cobalt-300); }

.theme-card-meta {

  color: var(--ink-500);

}

  border-radius: 12px;
  background: var(--cobalt-50);
  border: 1px solid var(--cobalt-200);
  margin: 0 0 20px;

.theme-confirm .eyebrow { margin-bottom: 6px; }
.theme-confirm-sub {
  font-size: 13.5px;
  color: var(--ink-700);
  line-height: 1.4;
}

/* =============================================================================

   ============================================================================= */
.option-card--radio .check {
  border-radius: 50%;
  background: transparent !important;
  border: 1.5px solid var(--ink-300);
  position: relative;
}
.option-card--radio.selected .check {
  border-color: var(--cobalt-600);
  background: transparent !important;
}
.option-card--radio .check svg { display: none !important; }
.option-card--radio.selected .check::after {
  content: '';
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--cobalt-600);
}

/* =============================================================================
   INTRO MODAL (Step 0)
   ============================================================================= */
.intro-overlay {
  position: fixed; inset: 0;
  background: rgba(10, 15, 31, 0.55);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  z-index: 9999;
  animation: introFade 180ms var(--ease-standard);
}
.intro-card {
  background: #ffffff;
  border-radius: 20px;
  padding: 36px 32px 30px;
  max-width: 440px; width: 100%;
  text-align: center;
  box-shadow: var(--shadow-3);
  animation: introPop 240ms var(--ease-standard);
}
.intro-eyebrow {
  display: inline-block;
  background: var(--cobalt-50);
  color: var(--cobalt-700);
  font-size: 12px; font-weight: 600;
  padding: 5px 12px; border-radius: 999px;
  letter-spacing: 0.02em;
  margin-bottom: 20px;
  text-transform: uppercase;
}
.intro-title {
  font-size: 28px; line-height: 1.15;
  font-weight: 800; letter-spacing: -0.02em;
  color: var(--ink-900);
  margin: 0 0 10px;
}
.intro-sub {
  font-size: 17px; line-height: 1.45;
  color: var(--ink-600);
  margin: 0 0 26px;
}
.intro-cta {
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--cobalt-600); color: #fff;
  padding: 14px 26px; border-radius: 12px;
  font-size: 16px; font-weight: 700; border: 0;
  font-family: inherit;
  cursor: pointer;
  transition: background var(--dur-med) var(--ease-standard), transform 80ms ease;
  box-shadow: var(--shadow-brand);
  width: 100%;
}
.intro-cta:hover { background: var(--cobalt-700); }
.intro-cta:active { transform: translateY(1px); }
.intro-fine {
  font-size: 13px; color: var(--ink-500);
  margin: 14px 0 0;
}
@keyframes introFade {
  from { opacity: 0; }
  to { opacity: 1; }
}
@keyframes introPop {
  from { opacity: 0; transform: scale(0.96) translateY(6px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}
@media (max-width: 480px) {
  .intro-card { padding: 28px 22px 24px; border-radius: 18px; }
  .intro-title { font-size: 24px; }
  .intro-sub { font-size: 15px; }
}

/* =============================================================================
   PRINT
   ============================================================================= */
@media print {
  body { background: #fff; }
  .page { padding: 0; max-width: none; }
  .header, .progress-row, .cta-row, .share-row, .save-hint, .capture, .win-callout, .eyebrow.no-print { display: none !important; }
  .plan-intro h1.h1 { color: #000; }
  .plan-card, .grocery-card { break-inside: avoid; box-shadow: none; border: 1px solid #999; }
  .recipe { break-inside: avoid; }
}

/* =============================================================================
   HELPERS
   ============================================================================= */

function mealsForTheme(themeKey) {
  return MEALS.filter(m => m.theme === themeKey);
}

function weekOfString(d) {
  const now = d || new Date();
  // Find this week's Monday
  const dow = now.getDay(); // 0=Sun
  const diff = (dow === 0 ? -6 : 1 - dow);
  const mon = new Date(now);
  mon.setDate(now.getDate() + diff);
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `Week of ${months[mon.getMonth()]} ${mon.getDate()}`;
}
function dateForDay(dayKey, baseDate) {
  const now = baseDate || new Date();
  const dow = now.getDay();
  const diff = (dow === 0 ? -6 : 1 - dow);
  const mon = new Date(now);
  mon.setDate(now.getDate() + diff);
  const idx = DAYS.findIndex(d => d.key === dayKey);
  const out = new Date(mon);
  out.setDate(mon.getDate() + idx);
  const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  return `${months[out.getMonth()]} ${out.getDate()}`;
}

// Format minutes saved into a friendly string: "30 minutes", "1 hour", "1.5 hours", "2 hours", etc.
function formatTimeSaved(mins) {
  if (mins < 60) return `${mins} minutes`;
  const hours = mins / 60;
  if (Number.isInteger(hours)) return `${hours} hour${hours === 1 ? '' : 's'}`;
  // Odd half-hours → show one decimal (1.5 hours, 2.5 hours, etc.)
  return `${hours.toFixed(1)} hours`;
}

function buildPlan(nights, selections) {
  // Only emit rows for the nights the user asked to plan. Leftover/off nights are
  // intentionally excluded — people aren't worried about them.
  const plan = [];
  for (const d of DAYS) {
    if (!nights.has(d.key)) continue;
    const sel = selections[d.key];
    const meal = MEALS.find(m => m.key === sel?.meal);
    if (!meal) continue;
    plan.push({
      day: d.key, label: d.label, short: d.short, date: dateForDay(d.key),
      meal, themeLabel: THEMES.find(t => t.key === meal.theme)?.label,
    });
  }
  return plan;
}

function buildGrocery(nights, selections) {
  const byName = {};
  for (const dayKey of nights) {
    const sel = selections[dayKey];
    if (!sel) continue;
    const meal = MEALS.find(m => m.key === sel.meal);
    if (!meal) continue;
    for (const ing of meal.ingredients) {
      const k = ing.name.toLowerCase();
      if (!byName[k]) {
        byName[k] = { name: ing.name, qty: ing.qty, cat: ing.cat };
      } else {
        if (byName[k].qty && byName[k].qty !== ing.qty) {
          byName[k].qty = byName[k].qty + ' + ' + ing.qty;
        }
      }
    }
  }
  const grouped = {};
  for (const k of CAT_ORDER) grouped[k] = [];
  for (const item of Object.values(byName)) {
    const c = CAT_ORDER.includes(item.cat) ? item.cat : 'OTHER';
    grouped[c].push(item);
  }
  for (const k of CAT_ORDER) grouped[k].sort((a, b) => a.name.localeCompare(b.name));
  const final = {};
  for (const k of CAT_ORDER) if (grouped[k].length) final[k] = grouped[k];
  return final;
}

function totalItems(grocery) {
  return Object.values(grocery).reduce((n, arr) => n + arr.length, 0);
}

// Analytics — fires PostHog event if loaded; falls back to console for local dev.
// Wrapped in try/catch so a missing/blocked PostHog can never break the planner.
function track(event, props) {
  try {
    if (typeof window !== 'undefined' && window.posthog && typeof window.posthog.capture === 'function') {
      window.posthog.capture(event, props || {});
    }
  } catch (_) { /* swallow — never let analytics throw */ }
  if (typeof window !== 'undefined' && window.console) {
    console.log('[track]', event, props || {});
  }
}

/* =============================================================================
   SHARE CARD — canvas-generated PNG (1080×1350 for Instagram story/feed)
   ============================================================================= */

function roundRect(ctx, x, y, w, h, r) {
  // Clamp radius so arcTo never overshoots (otherwise paths get malformed)
  r = Math.max(0, Math.min(r, w / 2, h / 2));
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}
function truncateCanvas(ctx, s, maxW) {
  if (ctx.measureText(s).width <= maxW) return s;
  let cur = s;
  while (ctx.measureText(cur + '…').width > maxW && cur.length > 0) cur = cur.slice(0, -1);
  return cur + '…';
}
function wrapCanvas(ctx, text, x, y, maxW, lineH) {
  const words = text.split(' ');
  let line = '';
  let cy = y;
  for (const w of words) {
    const test = line ? line + ' ' + w : w;
    if (ctx.measureText(test).width > maxW && line) {
      ctx.fillText(line, x, cy);
      line = w;
      cy += lineH;
    } else {
      line = test;
    }
  }
  if (line) ctx.fillText(line, x, cy);
  return cy;
}

function generateShareCard(data) {
  // Square 1080×1080 social share card — matches the Steven-provided hi-fi mockup.
  const W = 1080, H = 1080, PAD = 72;
  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');
  const sysFont = '-apple-system, "SF Pro Text", "Segoe UI", system-ui, sans-serif';
  const monoFont = '"SF Mono", "JetBrains Mono", ui-monospace, monospace';
  const COBALT = '#2b3dd6';
  const COBALT_50 = '#eef2ff';
  const INK_900 = '#0a0f1f';
  const INK_500 = '#6b7280';
  const INK_200 = '#e5e7eb';
  const INK_100 = '#f3f4f6';

  // Background — warm cream matching bg-page-alt
  ctx.fillStyle = '#f5f7fd';
  ctx.fillRect(0, 0, W, H);

  // Subtle cobalt wash in top-right corner
  const rad = ctx.createRadialGradient(W * 0.92, 40, 40, W * 0.92, 40, 720);
  rad.addColorStop(0, 'rgba(79, 70, 229, 0.10)');
  rad.addColorStop(1, 'rgba(79, 70, 229, 0)');
  ctx.fillStyle = rad;
  ctx.fillRect(0, 0, W, H);

  // ======= TOP ROW: logo + week chip =======
  const topY = PAD;
  const logoSize = 52;

  // Logo — white rounded square + grid glyph (ink lines)
  ctx.fillStyle = '#ffffff';
  roundRect(ctx, PAD, topY, logoSize, logoSize, 12);
  ctx.fill();
  ctx.strokeStyle = INK_200;
  ctx.lineWidth = 1;
  roundRect(ctx, PAD, topY, logoSize, logoSize, 12);
  ctx.stroke();
  ctx.strokeStyle = INK_900;
  ctx.lineWidth = 2.2;
  ctx.lineCap = 'round';
  const gx = PAD + 14, gy = topY + 14, gs = 24;
  ctx.beginPath();
  ctx.moveTo(gx, gy);             ctx.lineTo(gx, gy + gs);
  ctx.moveTo(gx + gs/2, gy);      ctx.lineTo(gx + gs/2, gy + gs);
  ctx.moveTo(gx + gs, gy);        ctx.lineTo(gx + gs, gy + gs);
  ctx.moveTo(gx, gy);             ctx.lineTo(gx + gs, gy);
  ctx.moveTo(gx, gy + gs/2);      ctx.lineTo(gx + gs, gy + gs/2);
  ctx.moveTo(gx, gy + gs);        ctx.lineTo(gx + gs, gy + gs);
  ctx.stroke();

  // Wordmark
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'left';
  ctx.fillStyle = INK_900;
  ctx.font = `800 24px ${sysFont}`;
  const wmX = PAD + logoSize + 14;
  const wmY = topY + logoSize/2;
  ctx.fillText('Meal Planning', wmX, wmY);
  const mpW = ctx.measureText('Meal Planning ').width;
  ctx.fillStyle = COBALT;
  ctx.fillText('OS', wmX + mpW, wmY);

  // Week chip top-right
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = INK_500;
  ctx.font = `500 16px ${monoFont}`;
  ctx.fillText((data.weekLabel || 'This week').toUpperCase(), W - PAD, topY + logoSize/2);

  // Divider below top row
  const dividerY = topY + logoSize + 28;
  ctx.strokeStyle = INK_200;
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(PAD, dividerY); ctx.lineTo(W - PAD, dividerY); ctx.stroke();

  // ======= EYEBROW =======
  ctx.textBaseline = 'alphabetic';
  ctx.textAlign = 'left';
  ctx.fillStyle = COBALT;
  ctx.font = `700 14px ${sysFont}`;
  const eyebrowY = dividerY + 46;
  ctx.fillText('PLANNED IN 60 SECONDS', PAD, eyebrowY);

  // ======= BIG HEADLINE =======
  // Line 1: "N dinners planned in 1 minute."   Line 2: "[time] saved this week."
  ctx.textAlign = 'left';
  const headlineSize = 64;
  ctx.font = `800 ${headlineSize}px ${sysFont}`;

  // Line 1 — "N dinners planned in 1 minute." with N in cobalt
  const line1Y = eyebrowY + 72;
  const nStr = `${data.cookCount}`;
  const nW = ctx.measureText(nStr).width;
  ctx.fillStyle = COBALT;
  ctx.fillText(nStr, PAD, line1Y);
  ctx.fillStyle = INK_900;
  const dinnerWord = ` dinner${data.cookCount === 1 ? '' : 's'} planned in 1 minute.`;
  ctx.fillText(dinnerWord, PAD + nW, line1Y);

  // Line 2 — "[time] saved this week." with time in cobalt
  const line2Y = line1Y + 84;
  const timeStr = data.timeSavedStr || '0 minutes';
  ctx.fillStyle = COBALT;
  ctx.fillText(timeStr, PAD, line2Y);
  const timeW = ctx.measureText(timeStr).width;
  ctx.fillStyle = INK_900;
  ctx.fillText(' saved this week.', PAD + timeW, line2Y);

  // ======= DAY CARDS =======
  // Show up to 5 planned nights in a horizontal row
  const cookPlans = (data.plan || []).slice(0, 5);
  const cardsY = line2Y + 76;
  const cardsCount = Math.max(1, cookPlans.length);
  const cardsGap = 14;
  const cardsAvailW = W - 2 * PAD;
  const cardW = Math.floor((cardsAvailW - cardsGap * (cardsCount - 1)) / cardsCount);
  const cardH = 220;

  cookPlans.forEach((row, i) => {
    const x = PAD + i * (cardW + cardsGap);
    const y = cardsY;

    // Card background — white on light cream, subtle shadow as a soft cobalt-tinted rect
    ctx.fillStyle = 'rgba(43, 61, 214, 0.08)';
    roundRect(ctx, x, y + 4, cardW, cardH, 14);
    ctx.fill();
    ctx.fillStyle = '#ffffff';
    roundRect(ctx, x, y, cardW, cardH, 14);
    ctx.fill();
    ctx.strokeStyle = INK_100;
    ctx.lineWidth = 1;
    roundRect(ctx, x, y, cardW, cardH, 14);
    ctx.stroke();

    // Day code — mono, top of card in a cobalt-50 pill
    const pillH = 32;
    const pillPadX = 10;
    ctx.font = `700 14px ${monoFont}`;
    const pillTextW = ctx.measureText(row.short).width;
    const pillW = pillTextW + pillPadX * 2;
    const pillX = x + 14;
    const pillY = y + 14;
    ctx.fillStyle = COBALT_50;
    roundRect(ctx, pillX, pillY, pillW, pillH, 8);
    ctx.fill();
    ctx.fillStyle = COBALT;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText(row.short, pillX + pillPadX, pillY + pillH/2 + 1);

    // Meal title — wraps up to 3 lines
    ctx.textBaseline = 'alphabetic';
    ctx.fillStyle = INK_900;
    ctx.font = `700 18px ${sysFont}`;
    const titleX = x + 14;
    const titleY = pillY + pillH + 32;
    const titleMaxW = cardW - 28;
    const titleLines = wrapLines(ctx, row.meal.title, titleMaxW, 3);
    titleLines.forEach((ln, j) => {
      ctx.fillText(ln, titleX, titleY + j * 24);
    });

    // Theme label — cobalt, small, bottom
    ctx.fillStyle = COBALT;
    ctx.font = `600 12px ${sysFont}`;
    const themeY = y + cardH - 18;
    ctx.fillText(truncateCanvas(ctx, row.themeLabel || '', titleMaxW), titleX, themeY);
  });

  // ======= EMOTIONAL QUOTE BLOCK =======
  // Fills the space between meal cards and footer with a sharp, emotionally-charged
  // reframing of the "what's for dinner?" problem — the core MPOS thesis in one line.
  const cardsEndY = cardsY + cardH;
  const quoteBoxY = cardsEndY + 60;
  const quoteBoxH = 180;
  const quoteBoxX = PAD;
  const quoteBoxW = W - 2 * PAD;

  // Soft cobalt-tinted panel (very subtle — visible on cream, but quiet)
  ctx.fillStyle = 'rgba(43, 61, 214, 0.06)';
  roundRect(ctx, quoteBoxX, quoteBoxY, quoteBoxW, quoteBoxH, 20);
  ctx.fill();
  // Left edge accent bar in cobalt
  ctx.fillStyle = COBALT;
  roundRect(ctx, quoteBoxX, quoteBoxY, 6, quoteBoxH, 3);
  ctx.fill();

  // Quote body — two lines of ink-900 bold, emotional reframing
  ctx.textAlign = 'left';
  ctx.textBaseline = 'alphabetic';
  const quoteTextX = quoteBoxX + 36;
  ctx.fillStyle = INK_900;
  ctx.font = `800 32px ${sysFont}`;
  const quoteLine1 = `"What's for dinner?" isn't a question`;
  const quoteLine2 = `you need to ask every night.`;
  ctx.fillText(quoteLine1, quoteTextX, quoteBoxY + 64);
  ctx.fillText(quoteLine2, quoteTextX, quoteBoxY + 104);

  // Attribution / payoff line in cobalt
  ctx.fillStyle = COBALT;
  ctx.font = `700 20px ${sysFont}`;
  ctx.fillText('Plug into the system once — not seven times a week.', quoteTextX, quoteBoxY + 150);

  // ======= FOOTER — stats + CTA + URL chip =======
  const footerY = H - PAD;
  // Stats chunk (left)
  ctx.textAlign = 'left';
  ctx.textBaseline = 'alphabetic';
  ctx.fillStyle = INK_500;
  ctx.font = `500 17px ${sysFont}`;
  const stats = `${data.totalGrocery || 0} grocery items · one trip · ${data.householdLabel || 'built for you'}`;
  ctx.fillText(truncateCanvas(ctx, stats, W/2 - PAD - 16), PAD, footerY);

  // URL chip (right)
  ctx.font = `700 17px ${sysFont}`;
  const urlText = 'Build yours free → app.mealplanningos.com/planner';
  ctx.textAlign = 'right';
  const urlW = ctx.measureText(urlText).width;
  const chipPadX = 16, chipPadY = 10;
  const chipH = 40;
  const chipW = urlW + chipPadX * 2;
  const chipX = W - PAD - chipW;
  const chipY = footerY - chipH + 6;
  ctx.fillStyle = INK_900;
  roundRect(ctx, chipX, chipY, chipW, chipH, chipH / 2);
  ctx.fill();
  ctx.fillStyle = '#ffffff';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillText(urlText, chipX + chipPadX, chipY + chipH/2 + 1);

  return canvas;
}

// Wrap text into up to maxLines lines; returns array of strings (last one may be …-truncated)
function wrapLines(ctx, text, maxW, maxLines) {
  const words = String(text || '').split(/\s+/);
  const lines = [];
  let cur = '';
  for (const w of words) {
    const tryLine = cur ? cur + ' ' + w : w;
    if (ctx.measureText(tryLine).width <= maxW) {
      cur = tryLine;
    } else {
      if (cur) lines.push(cur);
      cur = w;
      if (lines.length >= maxLines) break;
    }
  }
  if (cur && lines.length < maxLines) lines.push(cur);
  if (lines.length === maxLines && ctx.measureText(cur).width > maxW) {
    // truncate last line with ellipsis
    let last = cur;
    while (last.length > 1 && ctx.measureText(last + '…').width > maxW) {
      last = last.slice(0, -1);
    }
    lines[lines.length - 1] = last + '…';
  }
  return lines;
}

/* =============================================================================
   STEP 5 — PLAN REVEAL + EMAIL CAPTURE
   ============================================================================= */
/* =============================================================================
   SubscribeForm — reusable native lead-capture form
   -----------------------------------------------------------------------------
   POSTs to a Netlify Function proxy that forwards to the Beehiiv v2 API.
   Lives as its own component so it can be dropped onto any landing page that
   shares this design system.

   Configuration:
   - SUBSCRIBE_ENDPOINT (below) — the Netlify Function URL. Currently
     /.netlify/functions/subscribe; the function itself reads BEEHIIV_API_KEY
     and BEEHIIV_PUB_ID from Netlify env vars (same vars used by
     stripe-webhook.js for purchase → Beehiiv enrollment).
   - Default UTM values are supplied via props (`defaultUtms`). Any UTM params
     present in the current page URL override the defaults.

   Props:
   - defaultUtms?: { utm_source, utm_medium, utm_campaign } — fallback UTM values
   - referringSite?: string — referring_site override (defaults to current host+path)
   - successMessage?: string — inline text shown on success when no redirect
   - submitLabel?: string — button copy (default "Get the system (free)")
   - redirectTo?: string — if set, navigate here on success instead of
     showing the inline success state (e.g. "/thank-you")
   - onSuccess?: (email) => void — optional hook, fires before redirect
   ============================================================================= */
const SUBSCRIBE_ENDPOINT = '/.netlify/functions/subscribe';
const EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

// Pull any utm_* params already present in the page URL so attribution
// survives when users arrive from YouTube, LinkedIn, paid, etc.
function readUrlUtms() {
  try {
    const p = new URLSearchParams(window.location.search);
    const out = {};
    ['utm_source', 'utm_medium', 'utm_campaign', 'utm_term', 'utm_content'].forEach(k => {
      const v = p.get(k);
      if (v) out[k] = v;
    });
    return out;
  } catch { return {}; }
}

function SubscribeForm({
  defaultUtms,
  referringSite,
  successMessage = 'Check your email',
  submitLabel = 'Get the system (free)',
  redirectTo,
  onSuccess,
}) {
  const [email, setEmail] = useState('');
  const [status, setStatus] = useState('idle'); // 'idle' | 'submitting' | 'success' | 'error'
  const [error, setError] = useState('');

  async function handleSubmit(e) {
    e.preventDefault();
    if (status === 'submitting') return;

    const clean = email.trim().toLowerCase();
    if (!clean || !EMAIL_RE.test(clean)) {
      setError('Enter a valid email.');
      setStatus('error');
      return;
    }

    setStatus('submitting');
    setError('');

    // Merge default UTMs with any present in the URL (URL wins).
    const urlUtms = readUrlUtms();
    const utms = { ...(defaultUtms || {}), ...urlUtms };

    const refSite = referringSite
      || (typeof window !== 'undefined'
            ? `${window.location.host}${window.location.pathname}`.replace(/\/$/, '')
            : undefined);

    try {
      const res = await fetch(SUBSCRIBE_ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: clean, referring_site: refSite, ...utms }),
      });

      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        setError(data.error || 'Something went wrong. Try again.');
        setStatus('error');
        track('lm_subscribe_error', { status: res.status });
        return;
      }

      // Identify the user in PostHog so prior anonymous events on this session
      // (lm_household_set, lm_meal_picked, lm_plan_revealed, etc.) merge into
      // a real person profile keyed by email. UTMs ride along as person props
      // so we can slice acquisition cohorts in PostHog without leaving the tool.
      try {
        if (typeof window !== 'undefined' && window.posthog && typeof window.posthog.identify === 'function') {
          window.posthog.identify(clean, { email: clean, ...utms });
        }
      } catch (_) { /* never let analytics break the conversion */ }

      setStatus('success');
      track('lm_subscribe_success', { email: clean });
      if (typeof onSuccess === 'function') onSuccess(clean);

      // Redirect to the thank-you page if configured. Small delay so the
      // tracking call flushes and the success flip is visible for a beat.
      if (redirectTo) {
        setTimeout(() => { window.location.assign(redirectTo); }, 350);
      }
    } catch (err) {
      setError('Network error. Try again.');
      setStatus('error');
      track('lm_subscribe_error', { reason: 'network' });
    }
  }

  if (status === 'success') {
    return (
      <div className="capture-success" role="status" aria-live="polite">
        {successMessage}
      </div>
    );
  }

  return (
    <form className="capture-form" onSubmit={handleSubmit} noValidate>
      <input
        type="email"
        className="capture-input"
        placeholder="you@example.com"
        value={email}
        onChange={(e) => {
          setEmail(e.target.value);
          if (status === 'error') setStatus('idle');
        }}
        autoComplete="email"
        required
        aria-label="Email address"
        disabled={status === 'submitting'}
      />
      <button
        type="submit"
        className="capture-submit"
        disabled={status === 'submitting'}
      >
        {status === 'submitting' ? 'Sending…' : submitLabel}
      </button>
      {status === 'error' && (
        <div className="capture-error" role="alert">{error}</div>
      )}
    </form>
  );
}

function Step5Plan({ nights, selections, household, onBack }) {
  const plan = useMemo(() => buildPlan(nights, selections), [nights, selections]);
  const grocery = useMemo(() => buildGrocery(nights, selections), [nights, selections]);
  const totalGrocery = totalItems(grocery);
  const cookCount = plan.length;
  const householdLabel = HOUSEHOLDS.find(h => h.key === household)?.label;

  // ~30 minutes saved per dinner (decision + search + scramble eliminated)
  const minutesSaved = cookCount * 30;
  const timeSavedStr = formatTimeSaved(minutesSaved);

  const [checked, setChecked] = useState({});

  useEffect(() => {
    track('lm_plan_revealed', {
      nights: Array.from(nights),
      household,
      cook_count: cookCount,
      minutes_saved: minutesSaved,
    });
  }, []);

  const toggleItem = (cat, name) => {
    const k = `${cat}::${name}`;
    setChecked(prev => ({ ...prev, [k]: !prev[k] }));
  };

  // Canonical URL passed to navigator.share. Having a url field is CRITICAL
  // for LinkedIn/X/FB iOS share extensions — they ignore files + text and
  // render a preview card only from the shared URL's OG metadata. Without
  // this, LinkedIn auto-guesses a URL from page context (we saw it land on
  // mealplanningos.com/planner, which 404s on the Beehiiv root).
  //
  // UTMs on the share URL: friend-share hits get tagged so we can filter
  // them in Beehiiv's acquisition report (utm_source=friend). These UTMs
  // propagate to the subscribe.js call when the recipient clicks through.
  const SHARE_URL = 'https://app.mealplanningos.com/planner?utm_source=friend&utm_medium=share&utm_campaign=planner_v1';

  // Body text WITHOUT the URL — the share sheet will attach the URL
  // separately and let each target app decide where to put it (card vs
  // body). Duplicating the URL in text creates ugly LinkedIn posts.
  const shareText = `${cookCount} dinner${cookCount === 1 ? '' : 's'} planned in 1 minute. ${timeSavedStr} saved this week. Try the free planner:`;

  const share = async () => {
    track('lm_share_click', { method: 'image' });
    try {
      const canvas = generateShareCard({
        cookCount,
        timeSavedStr,
        plan,
        weekLabel: weekOfString(),
        totalGrocery,
        householdLabel,
      });
      const blob = await new Promise(res => canvas.toBlob(res, 'image/png', 0.95));
      if (!blob) throw new Error('canvas-blob-failed');
      const file = new File([blob], 'my-meal-plan.png', { type: 'image/png' });

      // Mobile: native share sheet with image + URL + text.
      // - Messages/Mail/WhatsApp: attach the image + text (url becomes a link)
      // - LinkedIn/X/FB: use url only → renders preview card from OG tags
      // - Pinterest/Gmail: use all three
      const sharePayload = {
        files: [file],
        title: 'My meal plan this week',
        text: shareText,
        url: SHARE_URL,
      };
      if (navigator.canShare && navigator.canShare(sharePayload)) {
        try {
          await navigator.share(sharePayload);
          return;
        } catch (e) { /* user cancelled — fall through to download */ }
      }
      // Some browsers can share url+text but not files. Try without files.
      if (navigator.share) {
        try {
          await navigator.share({ title: 'My meal plan this week', text: shareText, url: SHARE_URL });
          return;
        } catch (e) { /* fall through */ }
      }

      // Desktop fallback: download the PNG
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'my-meal-plan.png';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    } catch (e) {
      console.log('share error', e);
      // Last-resort fallback: copy text + URL
      try {
        await navigator.clipboard.writeText(`${shareText} ${SHARE_URL}`);
        alert('Copied text to clipboard!');
      } catch (err) {
        alert(`${shareText} ${SHARE_URL}`);
      }
    }
  };

  return (
    <>
      {/* PLAN INTRO — light header, no dark block */}
      <div className="plan-intro">
        <div className="eyebrow">{weekOfString()}</div>
        <h1 className="h1">Your week. Planned.</h1>
        <p className="sub">
          Built for <strong>{householdLabel}</strong>.
          {' '}{cookCount} dinner{cookCount === 1 ? '' : 's'} planned.
          {' '}One shopping trip.
        </p>
      </div>

      {/* WIN CALLOUT — time-saved headline, main value prop */}
      <div className="win-callout">
        <div className="win-callout-icon">⏱</div>
        <div className="win-callout-body">
          <div className="win-callout-headline">
            {cookCount} dinner{cookCount === 1 ? '' : 's'} planned in 1 minute.
          </div>
          <div className="win-callout-sub">
            That's <strong>{timeSavedStr} saved this week</strong> — no more 6pm "what's for dinner?"
            (at ~30 minutes back per dinner: deciding, searching, scrambling).
          </div>
        </div>
      </div>

      {/* PLAN CARD — hi-fi header bar */}
      <div className="plan-card">
        <div className="plan-card-header">
          <h3>Your week</h3>
          <div className="eyebrow">{cookCount} dinner{cookCount === 1 ? '' : 's'}</div>
        </div>
        {plan.map((row, i) => (
          <React.Fragment key={row.day}>
            <div className="plan-row">
              <div className="plan-day">
                <div className="day-code">{row.short}</div>
                <span className="date">{row.date}</span>
              </div>
              <div className="plan-meal">
                <div className="plan-title">
                  {row.meal.title}
                </div>
                <div className="plan-theme">{row.themeLabel}</div>
              </div>
            </div>
            <div className="recipe">
              <ol className="recipe-steps">
                {row.meal.steps.map((s, j) => <li key={j}>{s}</li>)}
              </ol>
            </div>
          </React.Fragment>
        ))}
      </div>

      {/* GROCERY CARD — hi-fi header bar */}
      <div className="grocery-card">
        <div className="grocery-header">
          <h3>Grocery list</h3>
          <div className="eyebrow">{totalGrocery} items</div>
        </div>
        <div className="grocery-body">
          {CAT_ORDER.filter(k => grocery[k]).map(cat => (
            <div key={cat} className="grocery-section">
              <h4>{CAT_LABEL[cat]}</h4>
              {grocery[cat].map(item => {
                const k = `${cat}::${item.name}`;
                const isChecked = !!checked[k];
                return (
                  <div
                    key={item.name}
                    className={`grocery-item ${isChecked ? 'checked' : ''}`}
                    onClick={() => toggleItem(cat, item.name)}
                  >
                    <div className="check" style={isChecked ? { background: 'var(--cobalt-600)', borderColor: 'var(--cobalt-600)' } : {}}>
                      {isChecked && <CheckIcon/>}
                    </div>
                    <span>{item.name}</span>
                    <span className="qty">{item.qty}</span>
                  </div>
                );
              })}
            </div>
          ))}
        </div>
        <div className="grocery-assumes">
          <strong>Assumed in your pantry:</strong> salt, pepper, red pepper flakes,
          cumin, chili powder, smoked paprika, Italian seasoning, sugar.
        </div>
      </div>

      <div className="save-hint">
        <strong>This page is your plan.</strong> Bookmark it (⌘D / Ctrl+D) or print to save a copy.
      </div>
      <div className="save-hint" style={{marginTop: 12}}>
        Know someone drowning in the 6pm scramble? Send this to them — it's free and no signup to try.
      </div>
      <div className="share-row">
        <button className="primary" onClick={share}>💛 Send to a friend who needs this</button>
        <button onClick={() => { track('lm_share_click', { method: 'print' }); window.print(); }}>Print / save as PDF</button>
      </div>

      {/* EMAIL CAPTURE — reusable SubscribeForm. Posts to the Netlify Function,
          which forwards to Beehiiv. UTMs from the URL override the defaults. */}
      <div className="capture">
        <div className="eyebrow">Keep the momentum</div>
        <h2>Learn the system that built this plan.</h2>
        <p>
          Get the free 10-minute Sunday system — the exact routine that kills the
          "what's for dinner?" question all week, so your energy shows up where it matters.
          Your welcome email kicks off a 5-day course to lock the habit in.
        </p>
        <SubscribeForm
          defaultUtms={{
            utm_source: 'dinner_planner',
            utm_medium: 'lead_magnet',
            utm_campaign: 'dinner_planner_v1',
          }}
          referringSite="app.mealplanningos.com/planner"
          redirectTo="https://app.mealplanningos.com/thank-you"
        />
      </div>

      <div className="cta-row" style={{marginTop: 20}}>
        <button className="cta cta-ghost" onClick={onBack}>← Edit my picks</button>
      </div>

      <div className="footer-meta">
        Meal Planning OS · Built from 300,000+ meals · Free planner, no account required
      </div>
    </>
  );
}

/* =============================================================================
   APP
   ============================================================================= */
function App() {
  const [step, setStep] = useState(1);
  const [household, setHousehold] = useState(null);
  const [nights, setNights] = useState(new Set());
  const [selections, setSelections] = useState({}); // { MON: { theme, meal } }
  const [cookIdx, setCookIdx] = useState(0);
  const [showIntro, setShowIntro] = useState(true);
  const [planStartAt, setPlanStartAt] = useState(null); // ms when user clicked Start

  useEffect(() => { track('lm_view'); }, []);
  useEffect(() => {
    track('lm_step', { step });
    if (typeof window !== 'undefined') window.scrollTo({ top: 0, behavior: 'smooth' });
  }, [step]);

  const toggleNight = (key) => {
    setNights(prev => {
      const next = new Set(prev);
      if (next.has(key)) next.delete(key);
      else next.add(key);
      return next;
    });
  };

  const pickTheme = (day, theme) => {
    setSelections(prev => {
      const prior = prev[day] || {};
      // If theme changed, clear the meal
      const meal = prior.theme === theme ? prior.meal : null;
      return { ...prev, [day]: { theme, meal } };
    });
    track('lm_theme_selected', { day, theme });
  };

  const pickMeal = (day, meal) => {
    setSelections(prev => ({ ...prev, [day]: { ...(prev[day] || {}), meal } }));
    track('lm_meal_selected', { day, meal });
  };

  const TOTAL = 5;

  return (
    <div className="page">
      {showIntro && (
        <IntroModal
          onStart={() => {
            setShowIntro(false);
            setPlanStartAt(Date.now());
            track('lm_intro_dismissed');
          }}
        />
      )}
      <Header step={step} />
      {step < TOTAL && <Progress step={step} totalSteps={TOTAL} />}
      {step === 1 && (
        <Step1Household
          value={household}
          onPick={(k) => { setHousehold(k); track('lm_household_selected', { household: k }); }}
          onNext={() => setStep(2)}
        />
      )}
      {step === 2 && (
        <Step2Nights
          nights={nights}
          onToggle={toggleNight}
          onNext={() => {
            track('lm_nights_selected', { count: nights.size, nights: Array.from(nights) });
            setCookIdx(0);
            setStep(3);
          }}
          onBack={() => setStep(1)}
        />
      )}
      {step === 3 && (
        <Step3Themes
          nights={nights}
          selections={selections}
          onPickTheme={pickTheme}
          cookIdx={cookIdx}
          onIdxChange={setCookIdx}
          onNext={() => { setCookIdx(0); setStep(4); }}
          onBack={() => setStep(2)}
        />
      )}
      {step === 4 && (
        <Step4Meals
          nights={nights}
          selections={selections}
          onPickMeal={pickMeal}
          cookIdx={cookIdx}
          onIdxChange={setCookIdx}
          onNext={() => setStep(5)}
          onBack={() => { setCookIdx(0); setStep(3); }}
        />
      )}
      {step === 5 && (
        <Step5Plan
          nights={nights}
          selections={selections}
          household={household}
          onBack={() => { setCookIdx(0); setStep(4); }}
        />
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
