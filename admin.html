<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Meal Planning OS — Admin</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #171a21;
      --panel-2: #1f2430;
      --border: #262c3a;
      --text: #e7eaf0;
      --muted: #9aa3b2;
      --accent: #7ac59a;
      --accent-2: #8ab4ff;
      --danger: #ff6b6b;
      --shadow: 0 1px 2px rgba(0,0,0,.3), 0 8px 24px rgba(0,0,0,.25);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 14px; line-height: 1.45; }
    a { color: var(--accent-2); text-decoration: none; }
    header { display: flex; align-items: center; justify-content: space-between;
      padding: 18px 24px; border-bottom: 1px solid var(--border); background: var(--panel); }
    header h1 { font-size: 16px; margin: 0; font-weight: 600; letter-spacing: .2px; }
    header .who { color: var(--muted); font-size: 12px; }
    header button { background: transparent; color: var(--muted); border: 1px solid var(--border);
      padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; }
    header button:hover { color: var(--text); border-color: #394357; }
    main { max-width: 1200px; margin: 0 auto; padding: 24px; }
    .note { color: var(--muted); font-size: 12px; margin: 0 0 16px; }
    .grid { display: grid; gap: 16px; }
    .kpis { grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); }
    .card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
      padding: 16px; box-shadow: var(--shadow); }
    .card h3 { margin: 0 0 4px; font-size: 12px; font-weight: 500; color: var(--muted);
      text-transform: uppercase; letter-spacing: .6px; }
    .kpi .value { font-size: 28px; font-weight: 600; }
    .kpi .sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .charts { grid-template-columns: 1fr 1fr; margin-top: 16px; }
    @media (max-width: 820px) { .charts { grid-template-columns: 1fr; } }
    .section-title { font-size: 13px; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: .6px; margin: 28px 0 10px; }
    .two-col { grid-template-columns: 1fr 1fr; }
    @media (max-width: 820px) { .two-col { grid-template-columns: 1fr; } }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); }
    th { color: var(--muted); font-weight: 500; font-size: 11px;
      text-transform: uppercase; letter-spacing: .5px; }
    td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
    .ret-row { display: flex; justify-content: space-between; padding: 6px 0;
      border-bottom: 1px dashed var(--border); }
    .ret-row:last-child { border-bottom: none; }
    .muted { color: var(--muted); }
    .status { padding: 40px 24px; text-align: center; color: var(--muted); }
    .status.error { color: var(--danger); }
    /* Login */
    .login { max-width: 360px; margin: 80px auto; background: var(--panel);
      border: 1px solid var(--border); border-radius: 10px; padding: 24px; }
    .login h2 { margin: 0 0 4px; font-size: 16px; }
    .login p { margin: 0 0 16px; color: var(--muted); font-size: 12px; }
    .login label { display: block; font-size: 12px; color: var(--muted); margin: 10px 0 4px; }
    .login input { width: 100%; background: var(--panel-2); color: var(--text);
      border: 1px solid var(--border); border-radius: 6px; padding: 10px; font-size: 14px; }
    .login button { width: 100%; margin-top: 16px; background: var(--accent); color: #0f1115;
      border: none; padding: 10px; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 14px; }
    .login .err { color: var(--danger); font-size: 12px; margin-top: 10px; min-height: 16px; }
    canvas { max-width: 100%; }
  </style>
</head>
<body>

  <div id="app">
    <div class="status">Loading…</div>
  </div>

  <!-- Same Supabase SDK & key your main app uses -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script>
    const SUPABASE_URL = 'https://vgtsxthotnnvknrqyhec.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_lq13XvUG9YsoiHrU8p36qg_EXE0vo8f';
    const _sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const root = document.getElementById('app');

    // ── Boot ────────────────────────────────────────────────────────────
    (async function init() {
      const { data: { session } } = await _sb.auth.getSession();
      if (!session) return renderLogin();
      await loadDashboard(session);
    })();

    // ── Login screen ────────────────────────────────────────────────────
    function renderLogin(errMsg) {
      root.innerHTML = `
        <div class="login">
          <h2>Admin sign-in</h2>
          <p>Use your admin email to view the dashboard.</p>
          <form id="loginForm">
            <label for="email">Email</label>
            <input id="email" type="email" autocomplete="email" required />
            <label for="password">Password</label>
            <input id="password" type="password" autocomplete="current-password" required />
            <button type="submit">Sign in</button>
            <div class="err" id="loginErr">${errMsg || ''}</div>
          </form>
        </div>
      `;
      document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const errEl = document.getElementById('loginErr');
        errEl.textContent = 'Signing in…';
        const { data, error } = await _sb.auth.signInWithPassword({ email, password });
        if (error) { errEl.textContent = error.message; return; }
        await loadDashboard(data.session);
      });
    }

    // ── Fetch + render dashboard ────────────────────────────────────────
    async function loadDashboard(session) {
      root.innerHTML = `<div class="status">Loading stats…</div>`;
      let data;
      try {
        const res = await fetch('/.netlify/functions/admin-stats', {
          headers: { Authorization: `Bearer ${session.access_token}` },
        });
        if (res.status === 401 || res.status === 403) {
          await _sb.auth.signOut();
          return renderLogin('Not authorized as admin.');
        }
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        data = await res.json();
      } catch (err) {
        root.innerHTML = `<div class="status error">Failed to load stats: ${err.message}</div>`;
        return;
      }
      render(data, session.user.email);
    }

    // ── Render ──────────────────────────────────────────────────────────
    function render(d, adminEmail) {
      const s = d.summary, f = d.features, r = d.retention;
      const fmt = (n) => (n ?? 0).toLocaleString();
      const kpi = (title, value, sub = '') => `
        <div class="card kpi">
          <h3>${title}</h3>
          <div class="value">${value}</div>
          <div class="sub">${sub}</div>
        </div>`;

      root.innerHTML = `
        <header>
          <div>
            <h1>Meal Planning OS — Admin Dashboard</h1>
            <div class="who">Signed in as ${adminEmail} · generated ${new Date(d.generatedAt).toLocaleString()}</div>
          </div>
          <div>
            <button id="refreshBtn">Refresh</button>
            <button id="signOutBtn">Sign out</button>
          </div>
        </header>
        <main>
          ${d.note ? `<p class="note">${d.note}</p>` : ''}

          <div class="section-title">Users</div>
          <div class="grid kpis">
            ${kpi('Total users', fmt(s.totalUsers), `${fmt(s.betaUsers)} beta · ${fmt(s.paidUsers)} paid`)}
            ${kpi('New (7d)',     fmt(s.newUsers7),  `${fmt(s.newUsers30)} in last 30d`)}
            ${kpi('Active (1d)',  fmt(s.active1),    'edited something today')}
            ${kpi('Active (7d)',  fmt(s.active7),    `${fmt(s.active30)} in last 30d`)}
          </div>

          <div class="grid charts">
            <div class="card">
              <h3>Signups per day (30d)</h3>
              <canvas id="signupsChart" height="140"></canvas>
            </div>
            <div class="card">
              <h3>Active users per day (30d)</h3>
              <canvas id="activeChart" height="140"></canvas>
            </div>
          </div>

          <div class="section-title">Engagement proxies</div>
          <div class="grid kpis">
            ${kpi('Avg lifespan', `${s.avgLifespanDays}d`,  'created → last edit')}
            ${kpi('Avg active days', `${s.avgActiveDays}`,  'distinct days saved')}
            ${kpi('Total snapshots', fmt(s.totalSnapshots), 'versions saved')}
            ${kpi('Onboarded users', fmt(f.usersOnboarded), 'completed onboarding')}
          </div>

          <div class="section-title">Feature usage</div>
          <div class="grid kpis">
            ${kpi('Recipes',       fmt(f.totalRecipes),      `${f.avgRecipesPerUser} avg · ${f.usersWithRecipes} users`)}
            ${kpi('Freezer items', fmt(f.totalFreezerItems), `${f.avgFreezerPerUser} avg · ${f.usersWithFreezer} users`)}
            ${kpi('Grocery items', fmt(f.totalGroceryItems), `${f.avgGroceryPerUser} avg · ${f.usersWithGroceries} users`)}
            ${kpi('Assignments',   fmt(f.totalAssignments),  'meal plan slots filled')}
          </div>

          <div class="section-title">Retention & top users</div>
          <div class="grid two-col">
            <div class="card">
              <h3>Retention (cohort proxy)</h3>
              <div class="ret-row"><span>Day 1</span><span><b>${r.day1}%</b> <span class="muted">of ${r.eligible.d1}</span></span></div>
              <div class="ret-row"><span>Day 7</span><span><b>${r.day7}%</b> <span class="muted">of ${r.eligible.d7}</span></span></div>
              <div class="ret-row"><span>Day 30</span><span><b>${r.day30}%</b> <span class="muted">of ${r.eligible.d30}</span></span></div>
              <p class="note" style="margin-top:12px">% of users whose user_data was still being edited at least N days after signup. Rough stickiness signal.</p>
            </div>
            <div class="card">
              <h3>Top users</h3>
              <table>
                <thead>
                  <tr>
                    <th>Email</th>
                    <th class="num">Recipes</th>
                    <th class="num">Snapshots</th>
                    <th class="num">Active&nbsp;days</th>
                  </tr>
                </thead>
                <tbody>
                  ${d.topUsers.map(u => `
                    <tr>
                      <td>${escapeHtml(u.email)}</td>
                      <td class="num">${u.recipes}</td>
                      <td class="num">${u.snapshots}</td>
                      <td class="num">${u.activeDays}</td>
                    </tr>
                  `).join('') || '<tr><td colspan="4" class="muted">No data yet.</td></tr>'}
                </tbody>
              </table>
            </div>
          </div>
        </main>
      `;

      document.getElementById('refreshBtn').addEventListener('click', async () => {
        const { data: { session } } = await _sb.auth.getSession();
        if (session) loadDashboard(session);
      });
      document.getElementById('signOutBtn').addEventListener('click', async () => {
        await _sb.auth.signOut();
        renderLogin();
      });

      drawLineChart('signupsChart', d.series.signupsByDay, '#7ac59a');
      drawLineChart('activeChart',  d.series.activeByDay,  '#8ab4ff');
    }

    function drawLineChart(canvasId, byDay, color) {
      const labels = Object.keys(byDay);
      const values = Object.values(byDay);
      new Chart(document.getElementById(canvasId), {
        type: 'line',
        data: {
          labels,
          datasets: [{
            data: values,
            borderColor: color,
            backgroundColor: color + '33',
            fill: true,
            tension: 0.3,
            pointRadius: 2,
            borderWidth: 2,
          }],
        },
        options: {
          responsive: true,
          plugins: { legend: { display: false } },
          scales: {
            x: { ticks: { color: '#9aa3b2', maxTicksLimit: 6 }, grid: { color: '#262c3a' } },
            y: { ticks: { color: '#9aa3b2', precision: 0 }, grid: { color: '#262c3a' }, beginAtZero: true },
          },
        },
      });
    }

    function escapeHtml(s) {
      return String(s ?? '').replace(/[&<>"']/g, c => (
        { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]
      ));
    }
  </script>
</body>
</html>
